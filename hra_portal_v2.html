<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>AC HRA Portal v2</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:"Microsoft JhengHei","Noto Sans TC",system-ui,sans-serif;background:#0f1626;color:#f1f5f9;min-height:100dvh}

/* ── Header ── */
.hdr{background:linear-gradient(135deg,#1a2540,#1e3050);border-bottom:1px solid #1e3050;padding:12px 18px;display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.logo{width:40px;height:40px;background:linear-gradient(135deg,#10b981,#059669);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.hdr-text{flex:1;min-width:0}
.hdr-title{font-size:15px;font-weight:700;line-height:1.2}
.hdr-sub{font-size:10px;color:#475569;margin-top:2px;text-transform:uppercase;letter-spacing:.04em}
.hdr-right{display:flex;align-items:center;gap:8px;flex-shrink:0;flex-wrap:wrap}
.lang-row{display:flex;background:#131f35;border:1px solid #1e3050;border-radius:7px;padding:2px;gap:2px}
.lb{padding:3px 9px;border-radius:5px;border:none;background:transparent;color:#64748b;cursor:pointer;font-size:10px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;font-family:inherit;transition:.15s}
.lb.on{background:#10b981;color:#fff}

/* ── GAS Bar ── */
.gas-bar{background:#131f35;border-bottom:1px solid #1e3050;padding:9px 18px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.gas-bar label{font-size:10px;font-weight:700;color:#475569;white-space:nowrap;text-transform:uppercase;letter-spacing:.06em}
.gas-bar input{flex:1;min-width:220px;background:#0f1626;border:1px solid #1e3050;border-radius:7px;color:#f1f5f9;padding:5px 10px;font-size:11px;font-family:monospace;outline:none;transition:.2s}
.gas-bar input:focus{border-color:#10b981}
.btn-xs{padding:5px 12px;border-radius:6px;font-size:11px;font-weight:700;cursor:pointer;border:none;font-family:inherit;transition:.15s}
.btn-save{background:#1a2540;color:#cbd5e1;border:1px solid #253058}.btn-save:hover{background:#253058}
.gas-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;background:#334155;transition:.3s}
.gas-dot.ok{background:#10b981;box-shadow:0 0 5px #10b981}
.gas-dot.err{background:#ef4444;box-shadow:0 0 4px #ef4444}
.gas-lbl{font-size:11px;color:#475569;min-width:60px}

/* ── Main ── */
.main{padding:16px;max-width:820px;margin:0 auto}

/* ── Module Grid ── */
.mgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:12px;margin-bottom:16px}

/* ── Module Card ── */
.mcard{background:#131f35;border:1px solid #1e3050;border-radius:14px;padding:18px;position:relative;overflow:hidden;transition:.2s}
.mcard:hover{border-color:#253058;box-shadow:0 4px 16px rgba(0,0,0,.3);transform:translateY(-1px)}

.mcard-stripe{position:absolute;top:0;left:0;right:0;height:3px}
.mc-att  .mcard-stripe{background:linear-gradient(90deg,#10b981,transparent)}
.mc-con  .mcard-stripe{background:linear-gradient(90deg,#3b82f6,transparent)}
.mc-ob   .mcard-stripe{background:linear-gradient(90deg,#f59e0b,transparent)}
.mc-mat  .mcard-stripe{background:linear-gradient(90deg,#ec4899,transparent)}
.mc-cal  .mcard-stripe{background:linear-gradient(90deg,#8b5cf6,transparent)}
.mc-ana  .mcard-stripe{background:linear-gradient(90deg,#06b6d4,transparent)}

/* Card header */
.mc-head{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.mc-icon{font-size:26px;width:38px;text-align:center;flex-shrink:0}
.mc-info{flex:1;min-width:0}
.mc-name{font-size:14px;font-weight:700;color:#f1f5f9}
.mc-sub{font-size:10px;color:#475569;margin-top:2px;font-family:monospace;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.mc-badge{font-size:10px;font-weight:700;padding:2px 8px;border-radius:10px;white-space:nowrap;flex-shrink:0}
.bd-ok  {background:#052e16;color:#4ade80;border:1px solid #166534}
.bd-old {background:#1c1003;color:#fbbf24;border:1px solid #92400e}
.bd-none{background:#1e293b;color:#64748b;border:1px solid #334155}
.bd-auto{background:#0c1a2e;color:#93c5fd;border:1px solid #1d4ed8}

/* Sync row */
.mc-sync{font-size:11px;color:#475569;font-family:monospace;margin-bottom:14px;min-height:14px;line-height:1.5}
.mc-sync .rec{font-weight:700}
.sync-ok {color:#10b981}
.sync-old{color:#f59e0b}
.sync-non{color:#475569}

/* Action buttons */
.mc-acts{display:flex;gap:7px}
.btn-open{flex:1.3;background:#1a2540;border:1px solid #253058;color:#cbd5e1;padding:9px 8px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;text-align:center;transition:.15s;text-decoration:none;display:inline-flex;align-items:center;justify-content:center;gap:4px}
.btn-open:hover{background:#253058;color:#f1f5f9}
.btn-push{flex:1;background:#1c1500;border:1px solid #92400e;color:#fbbf24;padding:9px 8px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;text-align:center;transition:.15s;display:flex;align-items:center;justify-content:center;gap:4px}
.btn-push:hover{background:#2a1d00}
.btn-pull{flex:1;background:#0c1a2c;border:1px solid #1d4ed8;color:#93c5fd;padding:9px 8px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;text-align:center;transition:.15s;display:flex;align-items:center;justify-content:center;gap:4px}
.btn-pull:hover{background:#0f2040}
.btn-push:disabled,.btn-pull:disabled{opacity:.4;cursor:not-allowed}

/* ── Summary row (top) ── */
.summary-row{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:8px;margin-bottom:14px}
.sum-card{background:#131f35;border:1px solid #1e3050;border-radius:10px;padding:10px 12px;text-align:center}
.sum-val{font-size:20px;font-weight:700;font-family:monospace;color:#10b981}
.sum-lbl{font-size:10px;color:#475569;margin-top:3px}

/* ── TG Button ── */
.btn-tg{background:#0c1e30;border:1px solid #1d4ed8;color:#60a5fa;padding:6px 14px;border-radius:7px;font-size:11px;font-weight:700;cursor:pointer;font-family:inherit;transition:.15s}
.btn-tg:hover{background:#0f2a42}

/* ── Log ── */
.log-wrap{background:#0a1120;border:1px solid #1e3050;border-radius:10px;padding:12px;margin-top:4px}
.log-hd{font-size:10px;font-weight:700;color:#334155;text-transform:uppercase;letter-spacing:.07em;margin-bottom:7px;display:flex;justify-content:space-between}
.log-hd button{font-size:9px;color:#334155;background:none;border:none;cursor:pointer;font-family:inherit}
.log-hd button:hover{color:#64748b}
.log-body{max-height:110px;overflow-y:auto;font-size:11px;font-family:monospace;line-height:1.75;color:#475569}
.ll-ok  {color:#4ade80}
.ll-err {color:#f87171}
.ll-info{color:#60a5fa}

/* ── Spinner ── */
@keyframes spin{to{transform:rotate(360deg)}}
.spin{display:inline-block;animation:spin .65s linear infinite;font-style:normal}

/* ── TG Menu (Telegram-style) ── */
.tg-menu{background:#131f35;border:1px solid #1e3050;border-radius:12px;padding:14px;margin-bottom:14px}
.tg-menu-title{font-size:11px;font-weight:700;color:#475569;text-transform:uppercase;letter-spacing:.06em;margin-bottom:10px}
.tg-btns{display:flex;flex-wrap:wrap;gap:7px}
.tg-btn{background:#1a2540;border:1px solid #253058;color:#cbd5e1;padding:8px 14px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;transition:.15s;display:inline-flex;align-items:center;gap:5px}
.tg-btn:hover{background:#253058;color:#f1f5f9}
.tg-btn.full{width:100%;justify-content:center}

/* ── Mobile ── */
@media(max-width:600px){
  .mgrid{grid-template-columns:1fr}
  .hdr-sub{display:none}
  .summary-row{grid-template-columns:repeat(3,1fr)}
  .mc-sub{display:none}
  .gas-bar input{min-width:160px}
}
@media(max-width:380px){
  .mc-acts{flex-wrap:wrap}
  .btn-open{flex:1 1 100%}
}
</style>
</head>
<body>

<!-- Header -->
<div class="hdr">
  <div class="logo">🏥</div>
  <div class="hdr-text">
    <div class="hdr-title" id="h-title">AC HRA Portal</div>
    <div class="hdr-sub">VANTAGE RIVER TEXTILES · SIHANOUKVILLE</div>
  </div>
  <div class="hdr-right">
    <button class="btn-tg" onclick="sendTgMenu()">📱 <span id="h-tg">Telegram 選單</span></button>
    <div class="lang-row">
      <button class="lb on" onclick="setLang('zh')">中</button>
      <button class="lb"    onclick="setLang('en')">EN</button>
      <button class="lb"    onclick="setLang('km')">ខ្មែរ</button>
    </div>
  </div>
</div>

<!-- GAS Config Bar -->
<div class="gas-bar">
  <label>GAS URL</label>
  <input id="gasInput" type="text" placeholder="https://script.google.com/macros/s/…/exec"/>
  <button class="btn-xs btn-save" onclick="saveGas()">儲存</button>
  <div class="gas-dot" id="gasDot"></div>
  <span class="gas-lbl" id="gasLbl">未設定</span>
</div>

<!-- Main -->
<div class="main">

  <!-- Summary strip -->
  <div class="summary-row" id="sum-row">
    <div class="sum-card"><div class="sum-val" id="s-total">—</div><div class="sum-lbl">總模組</div></div>
    <div class="sum-card"><div class="sum-val" id="s-synced" style="color:#10b981">—</div><div class="sum-lbl" id="s-synced-lbl">已同步</div></div>
    <div class="sum-card"><div class="sum-val" id="s-records" style="color:#93c5fd">—</div><div class="sum-lbl" id="s-records-lbl">筆記錄</div></div>
    <div class="sum-card"><div class="sum-val" id="s-last" style="font-size:13px;color:#fbbf24">—</div><div class="sum-lbl" id="s-last-lbl">最後同步</div></div>
  </div>

  <!-- Telegram quick menu -->
  <div class="tg-menu">
    <div class="tg-menu-title" id="tm-title">📱 快速開啟 / Quick Access</div>
    <div class="tg-btns">
      <button class="tg-btn" onclick="openMod('ac_hra_attendance_v1.html')">🕐 <span data-zh="出勤系統" data-en="Attendance" data-km="វត្តមាន">出勤系統</span></button>
      <button class="tg-btn" onclick="openMod('ac_hra_contract_v2.html')">📋 <span data-zh="合約管理" data-en="Contract" data-km="កិច្ចសន្យា">合約管理</span></button>
      <button class="tg-btn" onclick="openMod('ac_hra_onboarding_v2.html')">🚪 <span data-zh="入離職" data-en="Onboarding" data-km="ចូល/ចេញ">入離職</span></button>
      <button class="tg-btn" onclick="openMod('ac_hra_maternity_v1.html')">🤱 <span data-zh="產假" data-en="Maternity" data-km="មាតា">產假</span></button>
      <button class="tg-btn" onclick="openMod('ac_hra_calendar_v2.html')">📅 <span data-zh="行事曆" data-en="Calendar" data-km="ប្រតិទិន">行事曆</span></button>
      <button class="tg-btn" onclick="openMod('ac_hra_complete_v2.html')">📊 <span data-zh="分析中心" data-en="Analytics" data-km="វិភាគ">分析中心</span></button>
    </div>
  </div>

  <!-- Module Cards Grid -->
  <div class="mgrid" id="mod-grid">
    <!-- Rendered by JS -->
  </div>

  <!-- Log -->
  <div class="log-wrap">
    <div class="log-hd"><span id="log-hd-txt">操作紀錄</span><button onclick="clearLog()">清除</button></div>
    <div class="log-body" id="logBody"><span class="ll-info">就緒 · AC HRA Portal v2</span></div>
  </div>

</div><!-- /main -->

<script>
// ═══════════════════════════════════════════════════
// AC HRA Portal v2
// Style: Production Portal (dark cards, no sidebar)
// ═══════════════════════════════════════════════════
const GAS_KEY = 'ac_hra_gas_url';
let gasUrl    = '';
let LANG      = localStorage.getItem('ac_hra_lang') || 'zh';

// ── Module definitions ───────────────────────────
const MODULES = [
  {
    id      : 'attendance',
    icon    : '🕐',
    nameZh  : '出勤系統',
    nameEn  : 'Attendance',
    nameKm  : 'ប្រព័ន្ធវត្តមាន',
    file    : 'ac_hra_attendance_v1.html',
    storeKey: 'vrt_att_v5_db',
    color   : 'mc-att',
    getRecords: () => {
      try { const d = JSON.parse(localStorage.getItem('vrt_att_v5_db')||'{}'); return d.employees?.length||0; }
      catch(e){ return 0; }
    },
    getPayload: () => {
      const raw = localStorage.getItem('vrt_att_v5_db')||'{}';
      const d   = JSON.parse(raw);
      return { tool:'attendance', records: d.employees||[], summary: { monthSummaries: d.monthSummaries||[] } };
    },
    onPull: (records, meta) => {
      // Reconstruct attendance db format
      const db = { employees: records, monthSummaries: meta?.summary?.monthSummaries||[], log:[] };
      localStorage.setItem('vrt_att_v5_db', JSON.stringify(db));
    }
  },
  {
    id      : 'contract',
    icon    : '📋',
    nameZh  : '合約管理',
    nameEn  : 'Contract Tracker',
    nameKm  : 'តាមដានកិច្ចសន្យា',
    file    : 'ac_hra_contract_v2.html',
    storeKey: 'ac_hra_contract_db',
    color   : 'mc-con',
    getRecords: () => { try{ return JSON.parse(localStorage.getItem('ac_hra_contract_db')||'[]').length; }catch(e){return 0;} },
    getPayload: () => {
      const recs = JSON.parse(localStorage.getItem('ac_hra_contract_db')||'[]');
      return { tool:'contract', records: recs, recordCount: recs.length };
    },
    onPull: (records) => { localStorage.setItem('ac_hra_contract_db', JSON.stringify(records)); }
  },
  {
    id      : 'onboarding',
    icon    : '🚪',
    nameZh  : '入離職管理',
    nameEn  : 'Onboarding / Offboarding',
    nameKm  : 'ការគ្រប់គ្រងចូល/ចេញ',
    file    : 'ac_hra_onboarding_v2.html',
    storeKey: 'ac_hra_onboarding_db',
    color   : 'mc-ob',
    getRecords: () => { try{ const d=JSON.parse(localStorage.getItem('ac_hra_onboarding_db')||'{}'); return (d.records||d||[]).length; }catch(e){return 0;} },
    getPayload: () => {
      const d = JSON.parse(localStorage.getItem('ac_hra_onboarding_db')||'{}');
      const recs = Array.isArray(d) ? d : (d.records||[]);
      return { tool:'onboarding', records: recs, recordCount: recs.length, summary:{ auditLog: d.auditLog||[] } };
    },
    onPull: (records, meta) => {
      const db = { records, auditLog: meta?.summary?.auditLog||[] };
      localStorage.setItem('ac_hra_onboarding_db', JSON.stringify(db));
    }
  },
  {
    id      : 'maternity',
    icon    : '🤱',
    nameZh  : '產假追蹤',
    nameEn  : 'Maternity Tracker',
    nameKm  : 'តាមដានការសម្រាកមាតា',
    file    : 'ac_hra_maternity_v1.html',
    storeKey: 'vrt_maternity_v1',
    color   : 'mc-mat',
    getRecords: () => { try{ return JSON.parse(localStorage.getItem('vrt_maternity_v1')||'[]').length; }catch(e){return 0;} },
    getPayload: () => {
      const recs = JSON.parse(localStorage.getItem('vrt_maternity_v1')||'[]');
      return { tool:'maternity', records: recs, recordCount: recs.length };
    },
    onPull: (records) => { localStorage.setItem('vrt_maternity_v1', JSON.stringify(records)); }
  },
  {
    id      : 'calendar',
    icon    : '📅',
    nameZh  : '行事曆',
    nameEn  : 'Factory Calendar',
    nameKm  : 'ប្រតិទិនរោងចក្រ',
    file    : 'ac_hra_calendar_v2.html',
    storeKey: 'ac_hra_calendar_db',
    color   : 'mc-cal',
    getRecords: () => { try{ return JSON.parse(localStorage.getItem('ac_hra_calendar_db')||'[]').length; }catch(e){return 0;} },
    getPayload: () => {
      const recs = JSON.parse(localStorage.getItem('ac_hra_calendar_db')||'[]');
      return { tool:'calendar', records: recs, recordCount: recs.length };
    },
    onPull: (records) => { localStorage.setItem('ac_hra_calendar_db', JSON.stringify(records)); }
  },
  {
    id      : 'analytics',
    icon    : '📊',
    nameZh  : '分析中心',
    nameEn  : 'Analytics Center',
    nameKm  : 'មជ្ឈមណ្ឌលវិភាគ',
    file    : 'ac_hra_complete_v2.html',
    storeKey: null,
    color   : 'mc-ana',
    getRecords: () => 0,
    getPayload: null,
    onPull  : null,
    readOnly: true,
  },
];

// Cloud snap cache (from GAS status)
let cloudStatus = {};

// ── Helpers ─────────────────────────────────────
function modName(m) { return LANG==='en'?m.nameEn:LANG==='km'?m.nameKm:m.nameZh; }
function fmtISO(iso) {
  if (!iso) return '—';
  try {
    const d = new Date(iso);
    return `${pad(d.getMonth()+1)}/${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())}`;
  } catch(e) { return '—'; }
}
function ageStr(iso) {
  if (!iso) return '';
  const mins = (Date.now() - new Date(iso)) / 60000;
  if (mins < 60)   return `${Math.round(mins)}分前`;
  if (mins < 1440) return `${Math.round(mins/60)}小時前`;
  return `${Math.round(mins/1440)}天前`;
}
function pad(n) { return String(n).padStart(2,'0'); }

// ── INIT ────────────────────────────────────────
function init() {
  gasUrl = localStorage.getItem(GAS_KEY) || '';
  document.getElementById('gasInput').value = gasUrl;
  renderCards();
  if (gasUrl) { verifyGas(); fetchStatus(); }
  applyLang();
}

// ── GAS URL ─────────────────────────────────────
function saveGas() {
  gasUrl = document.getElementById('gasInput').value.trim();
  if (!gasUrl) return;
  localStorage.setItem(GAS_KEY, gasUrl);
  // Sync to shared cloud.js if loaded
  if (window.HRA?.Cloud) HRA.Cloud.setUrl(gasUrl);
  log('GAS URL 已儲存', 'info');
  verifyGas();
  fetchStatus();
}

async function verifyGas() {
  const dot = document.getElementById('gasDot');
  const lbl = document.getElementById('gasLbl');
  dot.className = 'gas-dot';
  lbl.textContent = '驗證中…';
  try {
    const r = await fetch(gasUrl + '?action=heartbeat', { redirect:'follow' });
    const d = await r.json();
    if (d.ok) {
      dot.className = 'gas-dot ok';
      lbl.textContent = '連線正常';
      log('✓ GAS 連線成功', 'ok');
    } else throw new Error(JSON.stringify(d));
  } catch(e) {
    dot.className = 'gas-dot err';
    lbl.textContent = '連線失敗';
    log('✗ GAS 連線失敗：' + e.message, 'err');
  }
}

async function fetchStatus() {
  if (!gasUrl) return;
  try {
    const r = await fetch(gasUrl + '?action=status', { redirect:'follow' });
    const d = await r.json();
    if (!d.ok) return;
    cloudStatus = d.data || {};
    renderCards();
    updateSummary();
  } catch(e) { /* silent */ }
}

// ── RENDER CARDS ────────────────────────────────
function renderCards() {
  const grid = document.getElementById('mod-grid');
  grid.innerHTML = MODULES.map(m => renderCard(m)).join('');
}

function renderCard(m) {
  const local   = m.getRecords();
  const cloud   = cloudStatus[m.id];
  const hasCloud= !!cloud?.timestamp;
  const age     = hasCloud ? ageStr(cloud.timestamp) : '';
  const mins    = hasCloud ? (Date.now() - new Date(cloud.timestamp)) / 60000 : Infinity;
  const isOld   = mins > 480;
  const badgeCls= !hasCloud ? 'bd-none' : isOld ? 'bd-old' : 'bd-ok';
  const badgeTxt= !hasCloud ? (LANG==='en'?'Never':LANG==='km'?'មិនទាន់':'未同步') : age;
  const syncCls = !hasCloud ? 'sync-non' : isOld ? 'sync-old' : 'sync-ok';
  const cloudRec= hasCloud ? cloud.recordCount : null;
  const name    = modName(m);

  const sub = m.storeKey || (LANG==='en'?'Read-only analytics':LANG==='km'?'វិភាគ':'整合分析');

  let syncLine = '';
  if (hasCloud) {
    syncLine = `☁ ${fmtISO(cloud.timestamp)} · <span class="rec">${cloudRec} 筆</span> · ${age}`;
  } else {
    syncLine = LANG==='en'?'Cloud: Not synced yet':LANG==='km'?'Cloud: មិនទាន់ Sync':'雲端：尚未同步';
  }

  const openLabel  = LANG==='en'?'Open':LANG==='km'?'បើក':'開啟';
  const pushLabel  = LANG==='en'?'Push':LANG==='km'?'Push':'☁ 推送';
  const pullLabel  = LANG==='en'?'Pull':LANG==='km'?'Pull':'⬇ 拉取';

  const noCloud = !m.getPayload;
  const actBtns = noCloud
    ? `<a class="btn-open" href="./${m.file}" target="_self" style="flex:1">📊 ${openLabel}</a>`
    : `<a class="btn-open" href="./${m.file}" target="_self">📂 ${openLabel}</a>
       <button class="btn-push" id="pp-${m.id}" onclick="push('${m.id}')" ${!gasUrl?'disabled':''}>☁ ${LANG==='en'?'Push':LANG==='km'?'Push':'推送'}</button>
       <button class="btn-pull" id="pl-${m.id}" onclick="pull('${m.id}')" ${!gasUrl?'disabled':''}>⬇ ${LANG==='en'?'Pull':LANG==='km'?'Pull':'拉取'}</button>`;

  return `<div class="mcard ${m.color}">
    <div class="mcard-stripe"></div>
    <div class="mc-head">
      <div class="mc-icon">${m.icon}</div>
      <div class="mc-info">
        <div class="mc-name">${name}</div>
        <div class="mc-sub">${sub}</div>
      </div>
      <span class="mc-badge ${noCloud?'bd-auto':badgeCls}">${noCloud?'自動':badgeTxt}</span>
    </div>
    <div class="mc-sync ${noCloud?'':syncCls}" id="st-${m.id}">
      ${noCloud?'讀取各模組 localStorage · 無需同步':syncLine}
    </div>
    <div style="font-size:11px;color:#475569;margin-bottom:10px" id="local-${m.id}">
      本地：<b style="color:#cbd5e1">${local} 筆</b>${hasCloud&&cloudRec!==null&&cloudRec!==local?` · 雲端：<span style="color:${isOld?'#fbbf24':'#4ade80'}">${cloudRec} 筆</span>`:''}
    </div>
    <div class="mc-acts">${actBtns}</div>
  </div>`;
}

// ── SUMMARY STRIP ────────────────────────────────
function updateSummary() {
  const mods       = MODULES.filter(m=>m.storeKey);
  const synced     = mods.filter(m=>cloudStatus[m.id]?.timestamp).length;
  const totalRecs  = mods.reduce((a,m)=>a+m.getRecords(),0);
  const timestamps = mods.map(m=>cloudStatus[m.id]?.timestamp).filter(Boolean).sort().reverse();
  document.getElementById('s-total').textContent   = MODULES.length;
  document.getElementById('s-synced').textContent  = synced + '/' + mods.length;
  document.getElementById('s-records').textContent = totalRecs;
  document.getElementById('s-last').textContent    = timestamps[0] ? fmtISO(timestamps[0]) : '—';
}

// ── PUSH ────────────────────────────────────────
async function push(id) {
  if (!gasUrl) { log('請先設定 GAS URL', 'err'); return; }
  const m = MODULES.find(x=>x.id===id);
  if (!m?.getPayload) { log(id + ' 無法從 Portal 推送', 'err'); return; }
  setBtns(id, true);
  log(`推送 ${modName(m)}…`, 'info');
  try {
    const payload = m.getPayload();
    if (!payload) { log(`${modName(m)} 無本地資料`, 'err'); return; }
    payload.action = 'push';

    // Chunk if large
    const CHUNK = 200;
    const recs  = payload.records || [];
    if (recs.length > CHUNK) {
      const total = Math.ceil(recs.length / CHUNK);
      for (let i=0;i<total;i++) {
        const chunk = { ...payload, records: recs.slice(i*CHUNK,(i+1)*CHUNK), chunk:i, totalChunks:total,
          summary: i===total-1 ? (payload.summary||{}) : {} };
        const r = await postGas(chunk);
        if (!r.ok) throw new Error(r.error||r.data?.error||'GAS error');
        log(`${modName(m)} 第${i+1}/${total}批`, 'info');
      }
    } else {
      const r = await postGas(payload);
      if (!r.ok) throw new Error(r.error||r.data?.error||'GAS error');
    }

    log(`✓ ${modName(m)} 推送完成（${recs.length} 筆）`, 'ok');
    // Update local snap
    const snap = { timestamp: new Date().toISOString(), recordCount: recs.length };
    cloudStatus[id] = snap;
    localStorage.setItem('ac_hra_snap_' + id, JSON.stringify(snap));
    renderCards(); updateSummary();
  } catch(e) {
    log(`✗ ${modName(m)} 推送失敗：${e.message}`, 'err');
  } finally { setBtns(id, false); }
}

// ── PULL ────────────────────────────────────────
async function pull(id) {
  if (!gasUrl) { log('請先設定 GAS URL', 'err'); return; }
  const m = MODULES.find(x=>x.id===id);
  if (!m?.onPull) { log(id + ' 無法拉取', 'err'); return; }
  const btn = document.getElementById('pl-' + id);
  if (btn) { btn.disabled=true; btn.innerHTML='<i class="spin">⏳</i>'; }
  log(`拉取 ${modName(m)}…`, 'info');
  try {
    // Get meta first
    const meta = await getGas(`${gasUrl}?action=pull&tool=${id}&meta=1`);
    if (!meta.ok) throw new Error(meta.error || 'GAS error');
    const d = meta.data;
    if (d.data === null || (!d.chunked && !d.records && !d.data)) {
      log(`${modName(m)} 雲端尚無資料`, 'info'); return;
    }

    let records, metaObj;
    if (!d.chunked) {
      records = d.records || d.data?.records || d.data || [];
      metaObj = { summary: d.data?.summary || {} };
    } else {
      const chunks = d.meta?.totalChunks || 1;
      records = [];
      for (let i=0;i<chunks;i++) {
        const r = await getGas(`${gasUrl}?action=pull&tool=${id}&chunk=${i}`);
        if (!r.ok) throw new Error(r.error);
        records.push(...(r.data?.records || []));
      }
      metaObj = { summary: d.meta?.summary || {} };
    }

    m.onPull(records, metaObj);
    log(`✓ ${modName(m)} 拉取完成（${records.length} 筆）→ 重新整理工具即可看到`, 'ok');
    cloudStatus[id] = { ...cloudStatus[id], recordCount: records.length };
    renderCards(); updateSummary();
  } catch(e) {
    log(`✗ ${modName(m)} 拉取失敗：${e.message}`, 'err');
  } finally {
    if (btn) { btn.disabled=false; btn.innerHTML=`⬇ ${LANG==='en'?'Pull':'拉取'}`; }
  }
}

// ── HTTP helpers ─────────────────────────────────
async function postGas(body) {
  // text/plain = no CORS preflight
  const r = await fetch(gasUrl, {
    method  : 'POST',
    redirect: 'follow',
    headers : { 'Content-Type': 'text/plain' },
    body    : JSON.stringify(body),
  });
  if (!r.ok) throw new Error('HTTP ' + r.status);
  return r.json();
}
async function getGas(url) {
  const r = await fetch(url, { redirect:'follow' });
  if (!r.ok) throw new Error('HTTP ' + r.status);
  return r.json();
}

// ── UI HELPERS ────────────────────────────────────
function setBtns(id, dis) {
  ['pp-','pl-'].forEach(p => {
    const el = document.getElementById(p+id);
    if (!el) return;
    el.disabled = dis;
    if (dis) { el.dataset.orig=el.innerHTML; el.innerHTML='<i class="spin">⏳</i>'; }
    else el.innerHTML = el.dataset.orig||el.innerHTML;
  });
}
function log(msg, type) {
  const el = document.getElementById('logBody');
  if (!el) return;
  const now = new Date();
  const t   = `${pad(now.getHours())}:${pad(now.getMinutes())}:${pad(now.getSeconds())}`;
  const cls = type==='ok'?'ll-ok':type==='err'?'ll-err':'ll-info';
  el.innerHTML += `\n<span class="${cls}">[${t}] ${msg}</span>`;
  el.scrollTop  = el.scrollHeight;
}
function clearLog() { document.getElementById('logBody').innerHTML='<span class="ll-info">就緒</span>'; }
