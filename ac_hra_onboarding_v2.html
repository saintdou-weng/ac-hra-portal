<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AC HRA 入離職管理 / VRT HR 合約 · 檔案 · 離職管理系統</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&family=Noto+Sans+Khmer:wght@400;500;700&family=Cormorant+Garamond:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<style>
:root{
  --navy-900:#0f1c33;
  --navy-800:#1a2842;
  --navy-700:#263859;
  --navy-600:#3a4d72;
  --gold-500:#c9a961;
  --gold-400:#d4b97a;
  --gold-300:#e3cfa0;
  --cream:#faf7f0;
  --paper:#ffffff;
  --line:#e6e2d4;
  --muted:#6b6758;
  --danger:#a93226;
  --danger-bg:#fdecea;
  --warn:#b45309;
  --warn-bg:#fef3c7;
  --ok:#2d6a4f;
  --ok-bg:#e8f3ec;
  --info:#1e4e8c;
  --info-bg:#e8f0fa;
  --shadow-sm:0 1px 2px rgba(15,28,51,.06);
  --shadow-md:0 4px 14px rgba(15,28,51,.08);
  --shadow-lg:0 12px 32px rgba(15,28,51,.12);
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{
  font-family:'Noto Sans TC','Noto Sans Khmer','Inter',system-ui,sans-serif;
  background:var(--cream);
  color:var(--navy-900);
  font-size:14px;line-height:1.55;
  -webkit-font-smoothing:antialiased;
}
.km{font-family:'Noto Sans Khmer',sans-serif}
.serif{font-family:'Cormorant Garamond',serif;font-weight:600;letter-spacing:.01em}

/* ---------- Header ---------- */
header.topbar{
  background:linear-gradient(135deg,var(--navy-900) 0%,var(--navy-700) 100%);
  color:#fff;padding:14px 24px;
  border-bottom:3px solid var(--gold-500);
  box-shadow:var(--shadow-md);
  position:sticky;top:0;z-index:50;
}
.brand{display:flex;align-items:center;gap:16px;flex-wrap:wrap}
.brand-mark{
  width:44px;height:44px;border-radius:6px;
  background:linear-gradient(135deg,var(--gold-500),var(--gold-300));
  color:var(--navy-900);
  display:grid;place-items:center;
  font-family:'Cormorant Garamond',serif;font-weight:700;font-size:20px;
  letter-spacing:.05em;
}
.brand-title{display:flex;flex-direction:column;gap:2px;flex:1;min-width:180px}
.brand-title .t1{font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:600;letter-spacing:.04em;color:var(--gold-300)}
.brand-title .t2{font-size:12px;color:#c4c8d0;letter-spacing:.06em;text-transform:uppercase}
.top-actions{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.lang-switch{display:flex;background:rgba(255,255,255,.08);border-radius:6px;overflow:hidden;border:1px solid rgba(255,255,255,.12)}
.lang-switch button{background:transparent;color:#c4c8d0;border:none;padding:6px 12px;cursor:pointer;font-size:12px;font-weight:500;letter-spacing:.03em}
.lang-switch button.active{background:var(--gold-500);color:var(--navy-900);font-weight:600}
.icon-btn{
  background:rgba(255,255,255,.08);
  color:#fff;border:1px solid rgba(255,255,255,.15);
  padding:6px 12px;border-radius:6px;cursor:pointer;font-size:12px;
  display:inline-flex;align-items:center;gap:6px;
}
.icon-btn:hover{background:rgba(201,169,97,.2);border-color:var(--gold-400)}

/* ---------- Nav tabs ---------- */
nav.tabs{
  background:var(--paper);
  border-bottom:1px solid var(--line);
  padding:0 24px;
  display:flex;gap:2px;overflow-x:auto;
  position:sticky;top:77px;z-index:40;
}
nav.tabs button{
  background:transparent;border:none;cursor:pointer;
  padding:14px 18px;font-size:13px;font-weight:500;
  color:var(--muted);
  border-bottom:3px solid transparent;
  white-space:nowrap;
  font-family:inherit;letter-spacing:.02em;
  transition:all .15s;
}
nav.tabs button:hover{color:var(--navy-800)}
nav.tabs button.active{color:var(--navy-900);border-bottom-color:var(--gold-500);font-weight:600}
nav.tabs button .badge{
  display:inline-block;background:var(--danger);color:#fff;
  font-size:10px;padding:1px 6px;border-radius:8px;margin-left:6px;font-weight:600;
}

/* ---------- Main ---------- */
main{padding:24px;max-width:1600px;margin:0 auto}
.page{display:none}
.page.active{display:block;animation:fadeIn .25s ease-out}
@keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}

/* ---------- Cards ---------- */
.card{
  background:var(--paper);border:1px solid var(--line);
  border-radius:8px;box-shadow:var(--shadow-sm);
  overflow:hidden;
}
.card-header{
  padding:16px 20px;border-bottom:1px solid var(--line);
  display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap;
  background:linear-gradient(to bottom,#fdfcf7,var(--paper));
}
.card-title{font-family:'Cormorant Garamond',serif;font-size:18px;font-weight:600;color:var(--navy-900);letter-spacing:.02em}
.card-body{padding:20px}
.card-body.tight{padding:0}

/* ---------- KPI tiles ---------- */
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:14px;margin-bottom:20px}
.kpi{
  background:var(--paper);border:1px solid var(--line);border-radius:8px;
  padding:16px 18px;position:relative;overflow:hidden;
  box-shadow:var(--shadow-sm);
}
.kpi::before{
  content:"";position:absolute;left:0;top:0;bottom:0;width:4px;background:var(--gold-500);
}
.kpi.danger::before{background:var(--danger)}
.kpi.warn::before{background:var(--warn)}
.kpi.ok::before{background:var(--ok)}
.kpi.info::before{background:var(--info)}
.kpi .label{font-size:11px;color:var(--muted);letter-spacing:.08em;text-transform:uppercase;font-weight:500}
.kpi .value{font-family:'Cormorant Garamond',serif;font-size:32px;font-weight:600;color:var(--navy-900);margin-top:4px;line-height:1}
.kpi .sub{font-size:11px;color:var(--muted);margin-top:4px}

/* ---------- Buttons ---------- */
.btn{
  display:inline-flex;align-items:center;gap:6px;
  padding:8px 14px;border-radius:6px;font-size:13px;font-weight:500;
  cursor:pointer;border:1px solid transparent;
  font-family:inherit;letter-spacing:.02em;
  transition:all .15s;
}
.btn-primary{background:var(--navy-800);color:#fff;border-color:var(--navy-800)}
.btn-primary:hover{background:var(--navy-900)}
.btn-gold{background:var(--gold-500);color:var(--navy-900);border-color:var(--gold-500);font-weight:600}
.btn-gold:hover{background:var(--gold-400)}
.btn-ghost{background:transparent;color:var(--navy-800);border-color:var(--line)}
.btn-ghost:hover{background:#f5f2e8;border-color:var(--gold-400)}
.btn-danger{background:var(--danger);color:#fff;border-color:var(--danger)}
.btn-danger:hover{background:#8b2a20}
.btn-sm{padding:5px 10px;font-size:12px}
.btn-xs{padding:3px 8px;font-size:11px}

/* ---------- Filters row ---------- */
.filters{
  display:flex;gap:8px;flex-wrap:wrap;align-items:center;
  padding:14px 20px;background:#fbf9f2;border-bottom:1px solid var(--line);
}
.filters input,.filters select{
  padding:6px 10px;border:1px solid var(--line);border-radius:5px;
  font-size:13px;font-family:inherit;background:#fff;color:var(--navy-900);
  min-width:140px;
}
.filters input:focus,.filters select:focus{outline:none;border-color:var(--gold-500);box-shadow:0 0 0 3px rgba(201,169,97,.15)}
.range-tabs{display:inline-flex;background:#fff;border:1px solid var(--line);border-radius:5px;overflow:hidden}
.range-tabs button{background:transparent;border:none;padding:6px 12px;cursor:pointer;font-size:12px;color:var(--muted);font-family:inherit}
.range-tabs button.active{background:var(--navy-800);color:#fff;font-weight:500}

/* ---------- Table ---------- */
.table-wrap{overflow-x:auto}
table.data{
  width:100%;border-collapse:collapse;font-size:13px;
}
table.data th{
  background:#f7f3e8;color:var(--navy-900);
  font-size:11px;letter-spacing:.06em;text-transform:uppercase;
  font-weight:600;padding:10px 12px;text-align:left;
  border-bottom:2px solid var(--gold-500);
  white-space:nowrap;position:sticky;top:0;
}
table.data td{
  padding:10px 12px;border-bottom:1px solid #f0ecdc;vertical-align:middle;
}
table.data tr:hover td{background:#fdfcf5}
table.data tr.flagged td{background:#fef6f5}
table.data tr.flagged:hover td{background:#fdecea}

.pill{display:inline-block;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:500;letter-spacing:.02em}
.pill-ok{background:var(--ok-bg);color:var(--ok)}
.pill-warn{background:var(--warn-bg);color:var(--warn)}
.pill-danger{background:var(--danger-bg);color:var(--danger)}
.pill-info{background:var(--info-bg);color:var(--info)}
.pill-muted{background:#eceae1;color:var(--muted)}

/* ---------- Modal ---------- */
.modal-backdrop{
  position:fixed;inset:0;background:rgba(15,28,51,.55);
  display:none;align-items:center;justify-content:center;z-index:100;
  padding:20px;backdrop-filter:blur(2px);
}
.modal-backdrop.open{display:flex;animation:fadeIn .2s}
.modal{
  background:var(--paper);border-radius:10px;
  width:100%;max-width:820px;max-height:90vh;overflow:hidden;
  display:flex;flex-direction:column;
  box-shadow:var(--shadow-lg);
  border:1px solid var(--gold-500);
}
.modal-header{
  padding:16px 22px;border-bottom:1px solid var(--line);
  display:flex;justify-content:space-between;align-items:center;
  background:linear-gradient(to right,#fbf9f2,var(--paper));
}
.modal-title{font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:600;color:var(--navy-900)}
.modal-close{background:none;border:none;font-size:22px;color:var(--muted);cursor:pointer;line-height:1;padding:4px}
.modal-close:hover{color:var(--danger)}
.modal-body{padding:22px;overflow-y:auto;flex:1}
.modal-footer{
  padding:14px 22px;border-top:1px solid var(--line);
  display:flex;justify-content:flex-end;gap:8px;background:#fbf9f2;
}

/* ---------- Form ---------- */
.form-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px}
.form-grid.cols-1{grid-template-columns:1fr}
.form-grid.cols-3{grid-template-columns:repeat(3,1fr)}
.form-grid .full{grid-column:1/-1}
.form-section{
  grid-column:1/-1;
  margin:6px 0 0;padding-top:14px;border-top:1px dashed var(--line);
  font-family:'Cormorant Garamond',serif;font-size:15px;font-weight:600;color:var(--gold-500);
  letter-spacing:.06em;text-transform:uppercase;
}
.form-section:first-child{border-top:none;padding-top:0}
label{display:block;font-size:11px;color:var(--muted);letter-spacing:.06em;text-transform:uppercase;font-weight:600;margin-bottom:4px}
label .req{color:var(--danger)}
input[type=text],input[type=date],input[type=number],input[type=email],input[type=tel],select,textarea{
  width:100%;padding:8px 10px;border:1px solid var(--line);border-radius:5px;
  font-size:13px;font-family:inherit;background:#fff;color:var(--navy-900);
}
textarea{min-height:70px;resize:vertical;font-family:inherit}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--gold-500);box-shadow:0 0 0 3px rgba(201,169,97,.15)}
input[readonly]{background:#f7f5ec;color:var(--muted)}
.checkbox-row{display:flex;gap:6px;align-items:center;font-size:13px;margin-top:4px}
.checkbox-row input{width:auto;margin:0}

/* ---------- Toast ---------- */
.toast-wrap{position:fixed;top:20px;right:20px;z-index:200;display:flex;flex-direction:column;gap:8px}
.toast{
  background:var(--navy-900);color:#fff;padding:12px 16px;border-radius:6px;
  font-size:13px;box-shadow:var(--shadow-lg);min-width:260px;max-width:360px;
  border-left:4px solid var(--gold-500);
  animation:slideIn .25s ease-out;
}
.toast.ok{border-left-color:var(--ok)}
.toast.warn{border-left-color:var(--warn)}
.toast.danger{border-left-color:var(--danger)}
@keyframes slideIn{from{transform:translateX(100%);opacity:0}to{transform:none;opacity:1}}

/* ---------- Alerts ---------- */
.alert{
  padding:12px 16px;border-radius:6px;border:1px solid;font-size:13px;
  display:flex;gap:10px;align-items:flex-start;margin-bottom:12px;
}
.alert.danger{background:var(--danger-bg);border-color:#f5c6c1;color:#7a1f18}
.alert.warn{background:var(--warn-bg);border-color:#fcd38f;color:#7a4b06}
.alert.ok{background:var(--ok-bg);border-color:#b8d8c3;color:#1e4a37}
.alert.info{background:var(--info-bg);border-color:#c3d6ee;color:#153b68}
.alert .icon{font-weight:700;font-size:15px}

/* ---------- Analytics chart ---------- */
.chart-box{background:#fbf9f2;border:1px solid var(--line);border-radius:6px;padding:16px;margin-bottom:14px}
.chart-box h4{font-size:12px;color:var(--muted);letter-spacing:.08em;text-transform:uppercase;margin-bottom:10px;font-weight:600}
.bar-row{display:grid;grid-template-columns:140px 1fr 50px;gap:10px;align-items:center;margin-bottom:6px;font-size:12px}
.bar-track{background:#eceae1;border-radius:3px;height:18px;overflow:hidden;position:relative}
.bar-fill{height:100%;background:linear-gradient(to right,var(--gold-500),var(--gold-400));border-radius:3px;transition:width .3s}
.bar-fill.danger{background:linear-gradient(to right,var(--danger),#c34a3d)}
.bar-fill.ok{background:linear-gradient(to right,var(--ok),#4f8e71)}
.bar-fill.navy{background:linear-gradient(to right,var(--navy-800),var(--navy-600))}

/* ---------- Empty state ---------- */
.empty{padding:40px 20px;text-align:center;color:var(--muted)}
.empty .big{font-family:'Cormorant Garamond',serif;font-size:24px;color:var(--navy-800);margin-bottom:8px}

/* ---------- Settings ---------- */
.setting-row{display:grid;grid-template-columns:200px 1fr;gap:14px;padding:12px 0;border-bottom:1px solid var(--line);align-items:center}
.setting-row:last-child{border-bottom:none}
.setting-row .setting-label{font-size:13px;font-weight:500;color:var(--navy-800)}
.setting-row .setting-hint{font-size:11px;color:var(--muted);margin-top:2px}

/* ---------- Print ---------- */
@media print{
  header.topbar,nav.tabs,.filters,.top-actions,.btn,.icon-btn,.modal-backdrop{display:none !important}
  body{background:#fff}
  main{padding:0;max-width:none}
  .card,.kpi{border:1px solid #000;box-shadow:none;page-break-inside:avoid}
  .card-header{background:#eee !important;-webkit-print-color-adjust:exact;print-color-adjust:exact}
  table.data th{background:#ddd !important;-webkit-print-color-adjust:exact;print-color-adjust:exact}
  .page{display:block !important}
  .page:not(.active){display:none !important}
  .print-only{display:block !important}
}
.print-only{display:none}
.print-header{text-align:center;padding:12px 0;border-bottom:2px solid var(--navy-900);margin-bottom:14px}
.print-header h1{font-family:'Cormorant Garamond',serif;font-size:22px;color:var(--navy-900)}
.print-header .sub{font-size:12px;color:var(--muted);margin-top:4px}

/* ---------- Responsive ---------- */
@media (max-width:860px){
  .form-grid,.form-grid.cols-3{grid-template-columns:1fr}
  nav.tabs{padding:0 12px}
  main{padding:14px}
}
</style>
</head>
<body>

<header class="topbar">
  <div class="brand">
    <div class="brand-mark">VRT</div>
    <div class="brand-title">
      <div class="t1" data-i18n="appTitle">VRT HR 人事管理系統</div>
      <div class="t2" data-i18n="appSubtitle">Contract · Personal File · Resignation</div>
    </div>
    <div class="top-actions">
      <div class="lang-switch">
        <button data-lang="zh" class="active">繁中</button>
        <button data-lang="en">EN</button>
        <button data-lang="km" class="km">ខ្មែរ</button>
      </div>
      <button class="icon-btn" onclick="UI.printPage()" title="Print"><span>⎙</span><span data-i18n="print">列印</span></button>
      <button class="icon-btn" onclick="UI.openSettings()" title="Settings"><span>⚙</span><span data-i18n="settings">設定</span></button>
    </div>
  </div>
</header>

<nav class="tabs" id="tabs">
  <button data-tab="dashboard" class="active"><span data-i18n="tab_dashboard">總覽</span> <span id="badge-anomaly" class="badge" style="display:none">0</span></button>
  <button data-tab="contracts"><span data-i18n="tab_contracts">合約</span></button>
  <button data-tab="personal"><span data-i18n="tab_personal">個人檔案</span></button>
  <button data-tab="resignation"><span data-i18n="tab_resignation">離職</span></button>
  <button data-tab="analytics"><span data-i18n="tab_analytics">分析</span></button>
</nav>

<main>
  <!-- ==================== DASHBOARD ==================== -->
  <section id="page-dashboard" class="page active">
    <div class="kpi-grid" id="kpiGrid"></div>

    <div class="card" style="margin-bottom:18px">
      <div class="card-header">
        <div class="card-title" data-i18n="alertsTitle">異常與到期提示</div>
        <div>
          <button class="btn btn-ghost btn-sm" onclick="Anomaly.refresh()"><span data-i18n="refresh">重新掃描</span></button>
          <button class="btn btn-gold btn-sm" onclick="Telegram.sendAnomalyReport()"><span data-i18n="sendTg">傳送 Telegram</span></button>
        </div>
      </div>
      <div class="card-body" id="anomalyPanel">
        <div class="empty"><div class="big" data-i18n="noAnomaly">目前無異常</div></div>
      </div>
    </div>

    <div style="display:grid;grid-template-columns:1fr 1fr;gap:18px" class="dash-split">
      <div class="card">
        <div class="card-header"><div class="card-title" data-i18n="expiringContracts">即將到期合約</div></div>
        <div class="card-body tight"><div id="expiringList"></div></div>
      </div>
      <div class="card">
        <div class="card-header"><div class="card-title" data-i18n="recentResignations">近期離職</div></div>
        <div class="card-body tight"><div id="recentResignList"></div></div>
      </div>
    </div>
  </section>

  <!-- ==================== CONTRACTS ==================== -->
  <section id="page-contracts" class="page">
    <div class="card">
      <div class="card-header">
        <div class="card-title" data-i18n="contractList">合約清單 (VRT-F-HR-03)</div>
        <div>
          <button class="btn btn-ghost btn-sm" onclick="Excel.importContracts()"><span data-i18n="import">匯入</span></button>
          <button class="btn btn-ghost btn-sm" onclick="Excel.exportContracts()"><span data-i18n="export">匯出</span></button>
          <button class="btn btn-gold btn-sm" onclick="Contract.openNew()"><span>＋</span><span data-i18n="add">新增</span></button>
        </div>
      </div>
      <div class="filters">
        <input type="text" id="filt-c-search" placeholder="搜尋 / Search / ស្វែងរក" oninput="Contract.render()">
        <select id="filt-c-dept" onchange="Contract.render()"><option value="" data-i18n="allDept">全部部門</option></select>
        <select id="filt-c-status" onchange="Contract.render()">
          <option value="" data-i18n="allStatus">全部狀態</option>
          <option value="active" data-i18n="active">在職</option>
          <option value="probation" data-i18n="probation">試用期</option>
          <option value="expiring" data-i18n="expiring">即將到期</option>
          <option value="expired" data-i18n="expired">已到期</option>
          <option value="terminated" data-i18n="terminated">已終止</option>
        </select>
        <div class="range-tabs" data-scope="c">
          <button data-range="all" class="active" data-i18n="all">全部</button>
          <button data-range="day" data-i18n="day">日</button>
          <button data-range="week" data-i18n="week">週</button>
          <button data-range="month" data-i18n="month">月</button>
          <button data-range="year" data-i18n="year">年</button>
        </div>
      </div>
      <div class="table-wrap">
        <table class="data" id="contractTable">
          <thead><tr id="contractHead"></tr></thead>
          <tbody id="contractBody"></tbody>
        </table>
      </div>
    </div>
  </section>

  <!-- ==================== PERSONAL FILE ==================== -->
  <section id="page-personal" class="page">
    <div class="card">
      <div class="card-header">
        <div class="card-title" data-i18n="personalList">個人檔案清單 (VRT-F-HR-04)</div>
        <div>
          <button class="btn btn-ghost btn-sm" onclick="Excel.importPersonal()"><span data-i18n="import">匯入</span></button>
          <button class="btn btn-ghost btn-sm" onclick="Excel.exportPersonal()"><span data-i18n="export">匯出</span></button>
          <button class="btn btn-gold btn-sm" onclick="Personal.openNew()"><span>＋</span><span data-i18n="add">新增</span></button>
        </div>
      </div>
      <div class="filters">
        <input type="text" id="filt-p-search" placeholder="搜尋 / Search / ស្វែងរក" oninput="Personal.render()">
        <select id="filt-p-dept" onchange="Personal.render()"><option value="" data-i18n="allDept">全部部門</option></select>
      </div>
      <div class="table-wrap">
        <table class="data" id="personalTable">

/* ---------- Utilities ---------- */
const U={
  uid:()=>Date.now().toString(36)+Math.random().toString(36).slice(2,8),
  today:()=>new Date().toISOString().slice(0,10),
  parseD:(s)=>{if(!s)return null;const d=new Date(s);return isNaN(d)?null:d},
  daysBetween(a,b){const da=U.parseD(a),db=U.parseD(b);if(!da||!db)return null;return Math.round((db-da)/(1000*60*60*24))},
  daysFromToday(s){return U.daysBetween(U.today(),s)},
  addDays(s,n){const d=U.parseD(s);if(!d)return"";d.setDate(d.getDate()+n);return d.toISOString().slice(0,10)},
  fmt(n){return n==null||n===""?"—":n},
  money(n){const v=Number(n);if(isNaN(v))return"—";return v.toLocaleString()},
  age(dob){const d=U.parseD(dob);if(!d)return null;const now=new Date();let a=now.getFullYear()-d.getFullYear();const m=now.getMonth()-d.getMonth();if(m<0||(m===0&&now.getDate()<d.getDate()))a--;return a},
  escape(s){return String(s??"").replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]))},
  inRange(dateStr,range){
    if(!dateStr||range==="all")return true;
    const d=U.parseD(dateStr);if(!d)return false;
    const now=new Date();const diff=Math.abs(now-d)/(1000*60*60*24);
    if(range==="day")return diff<=1;
    if(range==="week")return diff<=7;
    if(range==="month")return diff<=31;
    if(range==="year")return diff<=365;
    return true;
  },
};

/* ---------- Toast / Modal ---------- */
const UI={
  currentTab:"dashboard",
  toast(msg,type="ok"){
    const el=document.createElement("div");
    el.className="toast "+type;el.textContent=msg;
    document.getElementById("toastWrap").appendChild(el);
    setTimeout(()=>{el.style.transition="opacity .3s,transform .3s";el.style.opacity="0";el.style.transform="translateX(40px)";setTimeout(()=>el.remove(),300)},2800);
  },
  openModal(title,bodyHtml,footerHtml){
    document.getElementById("modalTitle").innerHTML=title;
    document.getElementById("modalBody").innerHTML=bodyHtml;
    document.getElementById("modalFooter").innerHTML=footerHtml||"";
    document.getElementById("modalBackdrop").classList.add("open");
  },
  closeModal(){document.getElementById("modalBackdrop").classList.remove("open")},
  switchTab(name){
    document.querySelectorAll("nav.tabs button").forEach(b=>b.classList.toggle("active",b.dataset.tab===name));
    document.querySelectorAll(".page").forEach(p=>p.classList.toggle("active",p.id==="page-"+name));
    UI.currentTab=name;
    if(name==="dashboard"){Dashboard.render()}
    if(name==="contracts"){Contract.render()}
    if(name==="personal"){Personal.render()}
    if(name==="resignation"){Resign.render()}
    if(name==="analytics"){Analytics.render()}
  },
  printPage(){window.print()},
  openSettings(){Settings.open()},
  applyLang(){
    document.documentElement.lang=LANG==="zh"?"zh-Hant":(LANG==="km"?"km":"en");
    document.body.classList.toggle("km",LANG==="km");
    document.querySelectorAll("[data-i18n]").forEach(el=>{
      const k=el.getAttribute("data-i18n");el.textContent=t(k);
    });
    // re-render current views
    Dashboard.render();
    if(UI.currentTab==="contracts")Contract.render();
    if(UI.currentTab==="personal")Personal.render();
    if(UI.currentTab==="resignation")Resign.render();
    if(UI.currentTab==="analytics")Analytics.render();
    // rebuild dept dropdowns
    Contract.buildFilters();Personal.buildFilters();Resign.buildFilters();
  },
};

/* ---------- Init tabs & language ---------- */
document.querySelectorAll("nav.tabs button").forEach(b=>{
  b.addEventListener("click",()=>UI.switchTab(b.dataset.tab));
});
document.querySelectorAll(".lang-switch button").forEach(b=>{
  b.addEventListener("click",()=>{
    document.querySelectorAll(".lang-switch button").forEach(x=>x.classList.toggle("active",x===b));
    LANG=b.dataset.lang;UI.applyLang();
  });
});

/* ---------- Filter range tabs ---------- */
document.querySelectorAll(".range-tabs").forEach(group=>{
  group.querySelectorAll("button").forEach(b=>{
    b.addEventListener("click",()=>{
      group.querySelectorAll("button").forEach(x=>x.classList.toggle("active",x===b));
      const scope=group.dataset.scope;
      if(scope==="c")Contract.render();
      else if(scope==="r")Resign.render();
      else Analytics.render();
    });
  });
});

/* =====================================================================
   CONTRACT MODULE — VRT-F-HR-03
   ===================================================================== */
const Contract={
  all(){return DB.contracts()},
  save(list){DB.saveContracts(list)},
  byId(id){return this.all().find(x=>x.id===id)},
  byEmpId(empId){return this.all().find(x=>x.empId===empId)},
  
  calcStatus(c){
    const today=U.today();
    if(c.status==="terminated")return "terminated";
    if(c.probationEnd && c.probationEnd>=today) return "probation";
    if(c.endDate){
      const d=U.daysFromToday(c.endDate);
      if(d<0)return "expired";
      if(d<=DB.settings().expireDays)return "expiring";
    }
    return "active";
  },
  
  buildFilters(){
    const deptSel=document.getElementById("filt-c-dept");
    if(!deptSel)return;
    const cur=deptSel.value;
    deptSel.innerHTML=`<option value="">${t("allDept")}</option>`+
      DEPARTMENTS.map(d=>`<option value="${U.escape(d)}" ${cur===d?"selected":""}>${U.escape(d)}</option>`).join("");
  },
  
  render(){
    this.buildFilters();
    const head=document.getElementById("contractHead");
    head.innerHTML=`
      <th>${t("fld_empId")}</th>
      <th>${t("fld_empName")}</th>
      <th>${t("fld_dept")}</th>
      <th>${t("fld_position")}</th>
      <th>${t("fld_contractType")}</th>
      <th>${t("fld_startDate")}</th>
      <th>${t("fld_endDate")}</th>
      <th>${t("fld_status")}</th>
      <th style="text-align:right">—</th>`;
    const search=(document.getElementById("filt-c-search").value||"").toLowerCase();
    const dept=document.getElementById("filt-c-dept").value;
    const status=document.getElementById("filt-c-status").value;
    const rangeBtn=document.querySelector(`.range-tabs[data-scope="c"] button.active`);
    const range=rangeBtn?rangeBtn.dataset.range:"all";
    
    const list=this.all().filter(c=>{
      const st=this.calcStatus(c);
      if(dept && c.dept!==dept)return false;
      if(status && st!==status)return false;
      if(range!=="all"){
        const ref=c.signDate||c.startDate;
        if(!U.inRange(ref,range))return false;
      }
      if(search){
        const hay=[c.empId,c.empName,c.empNameEn,c.empNameKm,c.position,c.contractNo,c.dept].join(" ").toLowerCase();
        if(!hay.includes(search))return false;
      }
      return true;
    });
    
    const body=document.getElementById("contractBody");
    if(!list.length){body.innerHTML=`<tr><td colspan="9"><div class="empty"><div class="big">—</div></div></td></tr>`;return;}
    body.innerHTML=list.map(c=>{
      const st=this.calcStatus(c);
      const pillClass={active:"pill-ok",probation:"pill-info",expiring:"pill-warn",expired:"pill-danger",terminated:"pill-muted"}[st];
      const daysLeft=c.endDate?U.daysFromToday(c.endDate):null;
      const endCell=c.endDate
        ?`${c.endDate}${daysLeft!=null?` <span style="color:${daysLeft<0?'var(--danger)':(daysLeft<=DB.settings().expireDays?'var(--warn)':'var(--muted)')};font-size:11px">(${daysLeft>=0?daysLeft:Math.abs(daysLeft)}${t("daysLeft")}${daysLeft<0?"↓":""})</span>`:""}`
        :"—";
      const flagged=["expiring","expired"].includes(st)?"flagged":"";
      return `<tr class="${flagged}">
        <td><strong>${U.escape(c.empId)}</strong></td>
        <td>${U.escape(c.empName||"")}${c.empNameEn?`<div style="font-size:11px;color:var(--muted)">${U.escape(c.empNameEn)}</div>`:""}</td>
        <td>${U.escape(c.dept||"")}${c.line?` / ${U.escape(c.line)}`:""}</td>
        <td>${U.escape(c.position||"")}</td>
        <td>${t("ct_"+(c.contractType||"fixed"))}</td>
        <td>${U.fmt(c.startDate)}</td>
        <td>${endCell}</td>
        <td><span class="pill ${pillClass}">${t(st)}</span></td>
        <td style="text-align:right;white-space:nowrap">
          <button class="btn btn-ghost btn-xs" onclick="Contract.viewOne('${c.id}')">${t("view")}</button>
          <button class="btn btn-ghost btn-xs" onclick="Contract.openEdit('${c.id}')">${t("edit")}</button>
          <button class="btn btn-ghost btn-xs" onclick="Contract.remove('${c.id}')">${t("delete")}</button>
        </td>
      </tr>`;
    }).join("");
  },
  
  formHtml(c){
    c=c||{};
    const deptOpts=DEPARTMENTS.map(d=>`<option value="${U.escape(d)}" ${c.dept===d?"selected":""}>${U.escape(d)}</option>`).join("");
    const ctOpts=["fixed","indef","probation"].map(v=>`<option value="${v}" ${c.contractType===v?"selected":""}>${t("ct_"+v)}</option>`).join("");
    const gOpts=["m","f","o"].map(v=>`<option value="${v}" ${c.gender===v?"selected":""}>${t("g_"+v)}</option>`).join("");

    return `
    <div class="form-grid">
      <div class="form-section">${t("sec_basic")}</div>
      <div><label>${t("fld_empId")} <span class="req">*</span></label><input id="f-empId" value="${U.escape(c.empId||"")}" required></div>
      <div><label>${t("fld_contractNo")}</label><input id="f-contractNo" value="${U.escape(c.contractNo||"")}"></div>
      <div><label>${t("fld_empName")}</label><input id="f-empName" value="${U.escape(c.empName||"")}"></div>
      <div><label>${t("fld_empNameEn")}</label><input id="f-empNameEn" value="${U.escape(c.empNameEn||"")}"></div>

      <div class="form-section">${t("sec_contract")}</div>
      <div><label>${t("fld_dept")} <span class="req">*</span></label><select id="f-dept"><option value="">—</option>${deptOpts}</select></div>
      <div><label>${t("fld_line")}</label><input id="f-line" value="${U.escape(c.line||"")}"></div>

      <div><label>${t("fld_signDate")}</label><input id="f-signDate" type="date" value="${c.signDate||U.today()}"></div>
      <div><label>${t("fld_startDate")} <span class="req">*</span></label><input id="f-startDate" type="date" value="${c.startDate||""}"></div>
      <div><label>${t("fld_endDate")}</label><input id="f-endDate" type="date" value="${c.endDate||""}"></div>

      <div><label>${t("fld_probationEnd")}</label><input id="f-probationEnd" type="date" value="${c.probationEnd||""}" readonly></div>
      <div><label>${t("fld_status")}</label><select id="f-status">${stOpts}</select></div>
      
      <div class="form-section">${t("sec_salary")}</div>
      <div><label>${t("fld_salary")} (USD)</label><input id="f-salary" type="number" step="0.01" value="${c.salary||""}"></div>
      <div><label>${t("fld_allowance")} (USD)</label><input id="f-allowance" type="number" step="0.01" value="${c.allowance||""}"></div>
      
      <div class="full"><label>${t("fld_notes")}</label><textarea id="f-notes">${U.escape(c.notes||"")}</textarea></div>
    </div>`;
  },
  
  recalcProbation(){
    const st=document.getElementById("f-startDate").value;
    const d=Number(document.getElementById("f-probationDays").value);
    if(st && d>0){document.getElementById("f-probationEnd").value=U.addDays(st,d)}
  },
  
  openNew(){
    UI.openModal(t("add")+" — "+t("contractList"),this.formHtml({}),
      `<button class="btn btn-ghost" onclick="UI.closeModal()">${t("cancel")}</button>
       <button class="btn btn-gold" onclick="Contract.saveFromForm()">${t("save")}</button>`);
    setTimeout(()=>Contract.recalcProbation(),10);
  },
  openEdit(id){
    const c=this.byId(id);if(!c)return;
    UI.openModal(t("edit")+" — "+U.escape(c.empId||""),this.formHtml(c),
      `<button class="btn btn-ghost" onclick="UI.closeModal()">${t("cancel")}</button>
       <button class="btn btn-gold" onclick="Contract.saveFromForm('${id}')">${t("save")}</button>`);
  },
  saveFromForm(id){
    const v=(x)=>document.getElementById(x).value;
    const empId=v("f-empId").trim();
    if(!empId){UI.toast(t("fld_empId")+" *",  "danger");return}
    const record={
      id:id||U.uid(),
      empId,contractNo:v("f-contractNo"),
      empName:v("f-empName"),empNameEn:v("f-empNameEn"),empNameKm:v("f-empNameKm"),
      gender:v("f-gender"),dob:v("f-dob"),nationality:v("f-nationality"),idNo:v("f-idNo"),
      dept:v("f-dept"),line:v("f-line"),position:v("f-position"),
      contractType:v("f-contractType"),signDate:v("f-signDate"),
      startDate:v("f-startDate"),endDate:v("f-endDate"),
      probationDays:Number(v("f-probationDays"))||0,probationEnd:v("f-probationEnd"),
      status:v("f-status"),salary:Number(v("f-salary"))||0,allowance:Number(v("f-allowance"))||0,
      notes:v("f-notes"),updatedAt:new Date().toISOString(),

  },
  
  calcStatus(r){
    if(r.status==="rejected")return "rejected";
    if(r.status==="completed"||r.lastDayActual&&r.lastDayActual<=U.today())return "completed";
    if(r.gmOk||(r.deptHeadOk && r.hrOk))return "approved";
    return "pending";

    this.buildFilters();

    const range=rangeBtn?rangeBtn.dataset.range:"all";
    
    const contractMap={};Contract.all().forEach(c=>contractMap[c.empId]=c);
    
    const list=this.all().filter(r=>{
      const st=this.calcStatus(r);
      const c=contractMap[r.empId]||{};
      const d=r.dept||c.dept;
      if(dept && d!==dept)return false;
      if(status && st!==status)return false;
      if(range!=="all" && !U.inRange(r.applyDate,range))return false;
      if(search){
        const hay=[r.empId,r.empName,c.empName,r.reasonDetail,r.dept,c.dept].join(" ").toLowerCase();
        if(!hay.includes(search))return false;

          <button class="btn btn-ghost btn-xs" onclick="Resign.openEdit('${r.id}')">${t("edit")}</button>

/* =====================================================================
   ANOMALY DETECTION
   ===================================================================== */
const Anomaly={
  list:[],
  
  detect(){
    const out=[];
    const set=DB.settings();
    const today=U.today();
    const contracts=Contract.all();
    const personals=Personal.all();
    const resigns=Resign.all();
    const empIds={};
    
    // duplicate empId
    contracts.forEach(c=>{
      if(empIds[c.empId])out.push({type:"an_duplicateId",sev:"danger",msg:`${c.empId} (${c.empName||""})`,ref:c.id,tab:"contracts"});
      empIds[c.empId]=c;
    });
    
    // contract expiry
    contracts.forEach(c=>{
      if(c.status==="terminated")return;
      if(c.endDate){
        const d=U.daysFromToday(c.endDate);
        if(d<0)out.push({type:"an_contractExpired",sev:"danger",msg:`${c.empId} ${c.empName||""} — ${c.endDate} (${Math.abs(d)}${t("sinceDays")})`,ref:c.id,tab:"contracts"});
        else if(d<=set.expireDays)out.push({type:"an_contractExpire",sev:"warn",msg:`${c.empId} ${c.empName||""} — ${c.endDate} (${d}${t("daysLeft")})`,ref:c.id,tab:"contracts"});
      }
      if(c.probationEnd){
        const d=U.daysFromToday(c.probationEnd);
        if(d>=0 && d<=7)out.push({type:"an_probationEnd",sev:"warn",msg:`${c.empId} — ${c.probationEnd} (${d}${t("daysLeft")})`,ref:c.id,tab:"contracts"});
      }
      // date integrity
      if(c.startDate && c.endDate && c.endDate<c.startDate)out.push({type:"an_invalidDate",sev:"danger",msg:`${c.empId} ${t("fld_endDate")} < ${t("fld_startDate")}`,ref:c.id,tab:"contracts"});
      // minor
      const age=U.age(c.dob);
      if(age!=null && age<18)out.push({type:"an_minorEmployee",sev:"danger",msg:`${c.empId} ${c.empName||""} — ${age}`,ref:c.id,tab:"contracts"});
    });
    
    // missing emergency contact (for active employees)
    contracts.forEach(c=>{
      if(Contract.calcStatus(c)==="terminated"||Contract.calcStatus(c)==="expired")return;
      const p=Personal.byEmpId(c.empId);
      if(!p||!p.emName||!p.emPhone){
        out.push({type:"an_noEmergency",sev:"warn",msg:`${c.empId} ${c.empName||""}`,ref:c.id,tab:"personal"});
      }
    });
    
    // pending resignation > 7 days
    resigns.forEach(r=>{
      const st=Resign.calcStatus(r);
      if(st==="pending" && r.applyDate){
        const d=Math.abs(U.daysFromToday(r.applyDate));
        if(d>7)out.push({type:"an_pendingResign",sev:"warn",msg:`${r.empId} ${r.empName||""} — ${d}${t("sinceDays")}`,ref:r.id,tab:"resignation"});
      }
      // missing exit interview 14 days after completion
      if(st==="completed" && r.lastDayActual){
        const d=Math.abs(U.daysFromToday(r.lastDayActual));
        if(d>14 && !r.interviewDate)out.push({type:"an_noInterview",sev:"warn",msg:`${r.empId} ${r.empName||""}`,ref:r.id,tab:"resignation"});
      }
    });
    
    // high turnover (per dept > 10% this month — rough)
    const thisMonth=today.slice(0,7);
    const resignedThisMonth=resigns.filter(r=>r.applyDate&&r.applyDate.slice(0,7)===thisMonth);
    const deptTurn={};
    resignedThisMonth.forEach(r=>{const d=r.dept||"?";deptTurn[d]=(deptTurn[d]||0)+1});
    const deptCount={};
    contracts.forEach(c=>{const st=Contract.calcStatus(c);if(st!=="terminated"){const d=c.dept||"?";deptCount[d]=(deptCount[d]||0)+1}});
    Object.keys(deptTurn).forEach(d=>{
      const total=deptCount[d]||1;
      const rate=deptTurn[d]/total*100;
      if(rate>10 && deptTurn[d]>=2)out.push({type:"an_highTurnover",sev:"warn",msg:`${d}: ${deptTurn[d]}/${total} (${rate.toFixed(1)}%)`,ref:"",tab:"analytics"});
    });
    
    this.list=out;
    return out;
  },
  
  refresh(){
    this.detect();
    this.renderPanel();
    const b=document.getElementById("badge-anomaly");
    if(this.list.length){b.style.display="inline-block";b.textContent=this.list.length}else b.style.display="none";
  },
  
  renderPanel(){
    const panel=document.getElementById("anomalyPanel");
    if(!this.list.length){panel.innerHTML=`<div class="empty"><div class="big">${t("noAnomaly")}</div></div>`;return}
    const grouped={};
    this.list.forEach(a=>{(grouped[a.type]=grouped[a.type]||[]).push(a)});
    panel.innerHTML=Object.entries(grouped).map(([type,items])=>{
      const sev=items[0].sev;
      const cls=sev;
      return `<div class="alert ${cls}">
        <div class="icon">${sev==="danger"?"!":"⚠"}</div>
        <div style="flex:1">
          <strong>${t(type)}</strong> <span style="font-size:11px;opacity:.7">× ${items.length}</span>
          <div style="margin-top:4px;font-size:12px">
            ${items.slice(0,8).map(x=>`<div>• ${U.escape(x.msg)} ${x.ref?`<button class="btn btn-xs btn-ghost" onclick="UI.switchTab('${x.tab}')">→</button>`:""}</div>`).join("")}
            ${items.length>8?`<div style="opacity:.7">…+${items.length-8}</div>`:""}
          </div>
        </div>
      </div>`;
    }).join("");
  },
};

/* =====================================================================
   ANALYTICS
   ===================================================================== */
const Analytics={
  getRange(){
    const b=document.querySelector("#analyticsRange button.active");
    return b?b.dataset.range:"month";
  },
  render(){
    const range=this.getRange();
    const contracts=Contract.all();
    const resigns=Resign.all();
    const now=new Date();
    let startDate;
    if(range==="day"){startDate=new Date(now);startDate.setDate(now.getDate()-1)}
    else if(range==="week"){startDate=new Date(now);startDate.setDate(now.getDate()-7)}
    else if(range==="month"){startDate=new Date(now);startDate.setMonth(now.getMonth()-1)}
    else{startDate=new Date(now);startDate.setFullYear(now.getFullYear()-1)}
    const startStr=startDate.toISOString().slice(0,10);
    
    const inRangeResign=resigns.filter(r=>r.applyDate&&r.applyDate>=startStr);
    const inRangeHire=contracts.filter(c=>c.startDate&&c.startDate>=startStr);
    const active=contracts.filter(c=>{const s=Contract.calcStatus(c);return s!=="terminated"&&s!=="expired"});
    const turnover=active.length?((inRangeResign.length/active.length)*100).toFixed(1):"0.0";
    
    document.getElementById("analyticsKpis").innerHTML=[
      {label:t("kpi_total"),val:active.length},
      {label:t("kpi_newMonth"),val:inRangeHire.length,cls:"ok"},
      {label:t("kpi_resignedMonth"),val:inRangeResign.length,cls:inRangeResign.length>5?"warn":""},
      {label:t("kpi_turnover"),val:turnover+"%",cls:Number(turnover)>5?"danger":""},
    ].map(k=>`<div class="kpi ${k.cls||""}"><div class="label">${U.escape(k.label)}</div><div class="value">${U.escape(String(k.val))}</div></div>`).join("");
    
    // Dept headcount
    const deptCount={};
    active.forEach(c=>{const d=c.dept||"—";deptCount[d]=(deptCount[d]||0)+1});
    const maxDept=Math.max(1,...Object.values(deptCount));
    document.getElementById("chartDeptHeadcount").innerHTML=
      Object.entries(deptCount).sort((a,b)=>b[1]-a[1]).map(([d,n])=>{
        const pct=n/maxDept*100;
        return `<div class="bar-row"><span>${U.escape(d)}</span><div class="bar-track"><div class="bar-fill navy" style="width:${pct}%"></div></div><span style="text-align:right">${n}</span></div>`;
      }).join("")||`<div class="empty">—</div>`;
    
    // Turnover trend (by time bucket)
    const buckets={};
    const fmtKey=(iso)=>{
      if(range==="day"||range==="week")return iso.slice(0,10);
      if(range==="month")return iso.slice(0,10);
      return iso.slice(0,7);
    };
    inRangeResign.forEach(r=>{const k=fmtKey(r.applyDate);buckets[k]=(buckets[k]||0)+1});
    const sortedKeys=Object.keys(buckets).sort();
    const maxB=Math.max(1,...Object.values(buckets));
    document.getElementById("chartTurnover").innerHTML=sortedKeys.length
      ?sortedKeys.map(k=>{const n=buckets[k];const pct=n/maxB*100;return `<div class="bar-row"><span style="font-size:11px">${U.escape(k)}</span><div class="bar-track"><div class="bar-fill danger" style="width:${pct}%"></div></div><span style="text-align:right">${n}</span></div>`}).join("")
      :`<div class="empty">—</div>`;
    
    // Resign reasons
    const reasons={};
    inRangeResign.forEach(r=>{const k=r.reasonCat||"other";reasons[k]=(reasons[k]||0)+1});
    const maxR=Math.max(1,...Object.values(reasons));
    document.getElementById("chartReasons").innerHTML=Object.entries(reasons).sort((a,b)=>b[1]-a[1]).map(([k,n])=>{
      const pct=n/maxR*100;
      return `<div class="bar-row"><span>${U.escape(t("rc_"+k))}</span><div class="bar-track"><div class="bar-fill" style="width:${pct}%"></div></div><span style="text-align:right">${n}</span></div>`;
    }).join("")||`<div class="empty">—</div>`;
  }
};

const Excel={
  exportSheet(filename,sheetName,rows){
    const ws=XLSX.utils.json_to_sheet(rows);

      const reader=new FileReader();
      reader.onload=(ev)=>{
        const data=new Uint8Array(ev.target.result);
        const wb=XLSX.read(data,{type:"array"});
        const ws=wb.Sheets[wb.SheetNames[0]];
        const rows=XLSX.utils.sheet_to_json(ws,{defval:""});

/* =====================================================================
   TELEGRAM (via GAS proxy — polling model, same as existing audit_v3)
   ===================================================================== */
const Telegram={
  async send(text){
    const s=DB.settings();
    if(!s.gasUrl){UI.toast(t("msg_tgFail")+" (GAS URL)","danger");return false}
    try{
      const url=s.gasUrl.startsWith("http")?s.gasUrl:`https://script.google.com/macros/s/${s.gasUrl}/exec`;
      const res=await fetch(url,{
        method:"POST",
        redirect:"follow",
        headers:{"Content-Type":"text/plain;charset=utf-8"},
        body:JSON.stringify({action:"sendTelegram",token:s.tgToken,chat_id:s.tgChat,text,parse_mode:"HTML"}),
      });
      UI.toast(t("msg_tgSent"),"ok");
      return true;
    }catch(e){
      console.error(e);UI.toast(t("msg_tgFail"),"danger");return false;
    }
  },
  
  sendAnomalyReport(){
    Anomaly.detect();
    if(!Anomaly.list.length){UI.toast(t("noAnomaly"),"ok");return}
    const grouped={};
    Anomaly.list.forEach(a=>(grouped[a.type]=grouped[a.type]||[]).push(a));
    let text=`<b>🏭 VRT HR 異常提示 / HR Alerts</b>\n${U.today()}\n\n`;
    Object.entries(grouped).forEach(([type,items])=>{
      text+=`<b>${t(type)}</b> (${items.length})\n`;
      items.slice(0,5).forEach(x=>text+=`• ${x.msg}\n`);
      if(items.length>5)text+=`  …+${items.length-5}\n`;
      text+=`\n`;
    });
    this.send(text);
  },
  
  sendDailySummary(){
    const contracts=Contract.all();
    const active=contracts.filter(c=>{const s=Contract.calcStatus(c);return s!=="terminated"&&s!=="expired"});
    const exp=contracts.filter(c=>Contract.calcStatus(c)==="expiring");
    const thisMonth=U.today().slice(0,7);
    const resignMonth=DB.resign().filter(r=>r.applyDate&&r.applyDate.slice(0,7)===thisMonth);
    const text=`<b>🏭 VRT HR 每日總覽</b>\n${U.today()}\n\n`+
      `• 在職員工 / Active: <b>${active.length}</b>\n`+
      `• 即將到期合約 / Expiring: <b>${exp.length}</b>\n`+
      `• 本月離職 / Resigned (mo.): <b>${resignMonth.length}</b>\n`+
      `• 異常項目 / Anomalies: <b>${Anomaly.list.length}</b>`;
    this.send(text);
  },
  
  sendContract(id){
    const c=Contract.byId(id);if(!c)return;
    const text=`<b>📄 VRT Contract / 合約</b>\n\n`+
      `ID: <b>${c.empId}</b>\n`+
      `Name: ${c.empName||""}\n`+
      `Dept: ${c.dept||""}\n`+
      `Position: ${c.position||""}\n`+
      `Contract: ${c.contractNo||""} (${c.contractType||""})\n`+
      `Start: ${c.startDate||""}\n`+
      `End: ${c.endDate||"—"}\n`+
      `Status: ${t(Contract.calcStatus(c))}`;
    this.send(text);
  },
  
  sendResign(id){
    const r=Resign.byId(id);if(!r)return;
    const text=`<b>📤 VRT Resignation / 離職</b>\n\n`+
      `ID: <b>${r.empId}</b>\n`+
      `Name: ${r.empName||""}\n`+
      `Dept: ${r.dept||""}\n`+
      `Apply: ${r.applyDate||""}\n`+
      `Last Day: ${r.lastDayPlan||""}\n`+
      `Reason: ${r.reasonCat?t("rc_"+r.reasonCat):""}\n`+
      `Status: ${t(Resign.calcStatus(r))}\n`+
      `Interview: ${r.interviewDate||"—"}`;
    this.send(text);
  },
};

      <div class="form-grid cols-1">
        <div class="form-section">${t("sec_setTg")}</div>
        <div class="setting-row">
          <div><div class="setting-label">${t("set_tgToken")}</div><div class="setting-hint">Bot API token from @BotFather</div></div>
          <input id="set-tgToken" value="${U.escape(s.tgToken||"")}" placeholder="123456:ABC...">
        </div>
        <div class="setting-row">
          <div><div class="setting-label">${t("set_tgChat")}</div><div class="setting-hint">e.g. -5115311567 (AU: WRAP group)</div></div>
          <input id="set-tgChat" value="${U.escape(s.tgChat||"")}" placeholder="-5115311567">
        </div>
        
        <div class="form-section">${t("sec_setGas")}</div>
        <div class="setting-row">
          <div><div class="setting-label">${t("set_gasUrl")}</div><div class="setting-hint">Paste deployment suffix or full URL</div></div>
          <input id="set-gasUrl" value="${U.escape(s.gasUrl||"")}">
        </div>
        
        <div class="form-section">${t("sec_setGeneral")}</div>
        <div class="setting-row">
          <div><div class="setting-label">${t("set_expireDays")}</div><div class="setting-hint">Days before expiry to alert (default 30)</div></div>
          <input id="set-expireDays" type="number" value="${s.expireDays||30}">
        </div>
        <div class="setting-row">
          <div><div class="setting-label">${t("set_autoTg")}</div><div class="setting-hint">Send daily summary via GAS time trigger</div></div>
          <label class="checkbox-row"><input type="checkbox" id="set-autoTg" ${s.autoTg?"checked":""}> ON</label>
        </div>
        
        <div class="form-section">${t("sec_setBackup")}</div>
        <div class="setting-row">
          <div><div class="setting-label">${t("backup_exportAll")}</div></div>
          <div><button class="btn btn-ghost btn-sm" onclick="Settings.exportAll()">${t("export")}</button></div>
        </div>
        <div class="setting-row">
          <div><div class="setting-label">${t("backup_importAll")}</div></div>
          <div><button class="btn btn-ghost btn-sm" onclick="Settings.importAll()">${t("import")}</button></div>
        </div>
        <div class="setting-row">
          <div><div class="setting-label">${t("backup_clear")}</div><div class="setting-hint" style="color:var(--danger)">⚠ Cannot be undone</div></div>
          <div><button class="btn btn-danger btn-sm" onclick="Settings.clearAll()">${t("delete")}</button></div>
        </div>
      </div>`,
      `<button class="btn btn-ghost" onclick="UI.closeModal()">${t("cancel")}</button>
       <button class="btn btn-gold" onclick="Settings.save()">${t("save")}</button>`);
  },
  save(){
    const v=(x)=>document.getElementById(x).value;
    const chk=(x)=>document.getElementById(x).checked;
    DB.saveSettings({
      tgToken:v("set-tgToken"),tgChat:v("set-tgChat"),
      gasUrl:v("set-gasUrl"),
      expireDays:Number(v("set-expireDays"))||30,
      autoTg:chk("set-autoTg"),
    });
    UI.closeModal();UI.toast(t("msg_saved"),"ok");
    Anomaly.refresh();Dashboard.render();
  },
  exportAll(){
    const all={
      contracts:DB.contracts(),personal:DB.personal(),resign:DB.resign(),settings:DB.settings(),
      exportedAt:new Date().toISOString(),version:"1.0",
    };
    const blob=new Blob([JSON.stringify(all,null,2)],{type:"application/json"});
    const a=document.createElement("a");a.href=URL.createObjectURL(blob);
    a.download=`VRT_HR_backup_${U.today()}.json`;a.click();
    UI.toast(t("msg_exported"),"ok");
  },
  importAll(){
    const input=document.createElement("input");input.type="file";input.accept=".json";
    input.onchange=(e)=>{
      const f=e.target.files[0];if(!f)return;
      const r=new FileReader();
      r.onload=(ev)=>{
        try{
          const data=JSON.parse(ev.target.result);
          if(data.contracts)DB.saveContracts(data.contracts);
          if(data.personal)DB.savePersonal(data.personal);
          if(data.resign)DB.saveResign(data.resign);
          if(data.settings)DB.saveSettings(data.settings);
          UI.toast(t("msg_imported"),"ok");
          UI.closeModal();
          Contract.render();Personal.render();Resign.render();Dashboard.render();Anomaly.refresh();
        }catch(e){UI.toast("JSON parse error","danger");console.error(e)}
      };
      r.readAsText(f);
    };
    input.click();
  },
  clearAll(){
    if(!confirm(t("confirmDelete")+"\n\n"+t("backup_clear")))return;
    if(!confirm("⚠ 再次確認 / Final confirm?"))return;
    [K.contracts,K.personal,K.resign].forEach(k=>localStorage.removeItem(k));
    UI.toast(t("msg_deleted"),"warn");
    UI.closeModal();
    Contract.render();Personal.render();Resign.render();Dashboard.render();Anomaly.refresh();
  },
};

/* ── Cloud Pull / Heartbeat patch ── */
function getGasUrl(){
  const s=DB.settings();
  const g=s.gasUrl||"";
  return g.startsWith("http")?g:(g?`https://script.google.com/macros/s/${g}/exec`:"");
}
async function cloudHeartbeat(){
  const url=getGasUrl();
  if(!url){UI.toast("請先設定 GAS URL","danger");return;}
  try{
    const r=await fetch(url+"?action=heartbeat",{method:"GET",redirect:"follow"});
    const d=await r.json();
    UI.toast(d.ok?"✅ GAS 連線正常":"❌ "+JSON.stringify(d),"info");
  }catch(e){UI.toast("❌ "+e.message,"danger");}
}
async function cloudPush(){
  const url=getGasUrl();
  if(!url){UI.toast("請先設定 GAS URL","danger");return;}
  try{
    const data=DB.getAll?DB.getAll():{
      contracts:DB.get("hr_contracts",[]),
      resignations:DB.get("hr_resignations",[]),
      employees:DB.get("hr_employees",[]),
    };
    const payload={action:"push",tool:"onboarding",records:data,
      recordCount:Object.keys(data).length,updatedAt:new Date().toISOString()};
    const r=await fetch(url,{method:"POST",redirect:"follow",
      headers:{"Content-Type":"text/plain;charset=utf-8"},body:JSON.stringify(payload)});
    const d=await r.json();
    UI.toast(d.ok?"✅ 已推送至雲端":"❌ "+d.error,"info");
  }catch(e){UI.toast("❌ "+e.message,"danger");}
}
async function cloudPull(){
  const url=getGasUrl();
  if(!url){UI.toast("請先設定 GAS URL","danger");return;}
  if(!confirm("拉取雲端資料會覆蓋本地，確定？"))return;
  try{
    const r=await fetch(url+"?action=pull&tool=onboarding&meta=1",{method:"GET",redirect:"follow"});
    const d=await r.json();
    if(!d.ok)throw new Error(d.error);
    const dd=d.data;
    if(dd.data===null){UI.toast("雲端尚無資料","info");return;}
    const recs=dd.records||dd.data?.records||dd.data||{};
    if(typeof recs==="object"&&!Array.isArray(recs)){
      Object.entries(recs).forEach(([k,v])=>localStorage.setItem(k,JSON.stringify(v)));
    }
    UI.toast("✅ 已從雲端拉取","info");
    location.reload();
  }catch(e){UI.toast("❌ "+e.message,"danger");}
}
</script>
