<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>VRT 整合分析</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<style>
:root{
  --bg:#e8f4fd;--bg2:#fff;--bg3:#d6eefa;--bg4:#c4e3f5;
  --navy:#1e3a5f;--teal:#0f766e;--gold:#d97706;
  --red:#dc2626;--green:#16a34a;--blue:#2563eb;--pu:#7c3aed;--gray:#6b7a9e;
  --brd:#b8d9ef;--brd2:#7cbad6;
  --sh:0 1px 4px #1e3a5f14;--sh2:0 3px 12px #1e3a5f22;
  --sans:'DM Sans','Noto Sans TC',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--navy);font-family:var(--sans);min-height:100vh;font-size:13px}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:var(--bg3)}
::-webkit-scrollbar-thumb{background:var(--brd2);border-radius:3px}

/* ── HEADER ── */
#hdr{background:var(--navy);height:50px;display:flex;align-items:center;justify-content:space-between;padding:0 16px;position:sticky;top:0;z-index:300;box-shadow:0 2px 8px #0006}
.hlogo{display:flex;align-items:center;gap:9px}
.hvrt{font-size:17px;font-weight:700;color:#f0a030;letter-spacing:1.5px;padding-right:10px;border-right:1px solid #fff3}
.htit{font-size:10px;color:#ffffffaa}
.hright{display:flex;align-items:center;gap:6px}
.hbtn{font-size:11px;font-weight:600;padding:4px 9px;border-radius:4px;border:1px solid;cursor:pointer;transition:.15s;display:inline-flex;align-items:center;gap:4px;white-space:nowrap}
.hbtn.pull{background:#0f766e;color:#fff;border-color:#0f766e}
.hbtn.push{background:#2563eb;color:#fff;border-color:#2563eb}
.hbtn.prt {background:#555;color:#fff;border-color:#555}
.hbtn.lang{background:transparent;color:#ffffffcc;border-color:#ffffff44}
.hbtn.lang.on{background:#f0a030;color:#000;border-color:#f0a030}
.sync-tip{font-size:10px;color:#f59e0b;font-family:monospace;white-space:nowrap;margin-left:4px}
.sync-tip.ok{color:#10b981}

/* ── TABBAR ── */
#tabbar{background:var(--bg2);border-bottom:2px solid var(--brd);display:flex;padding:0 14px;position:sticky;top:50px;z-index:200;overflow-x:auto;gap:0;box-shadow:0 1px 3px #0001}
.tab{font-size:11px;font-weight:700;letter-spacing:.3px;padding:10px 13px;border:none;background:transparent;color:var(--gray);cursor:pointer;border-bottom:3px solid transparent;margin-bottom:-2px;transition:.15s;white-space:nowrap}
.tab:hover{color:var(--navy);background:var(--bg3)}
.tab.on{color:var(--navy);border-bottom-color:var(--gold)}

/* ── PERIOD BAR ── */
.pbar{display:flex;align-items:center;gap:7px;flex-wrap:wrap;padding:9px 13px;background:var(--bg2);border:1px solid var(--brd);border-radius:8px;margin-bottom:12px}
.ptab{font-size:11px;font-weight:700;padding:4px 10px;border-radius:4px;border:1px solid var(--brd2);background:transparent;color:var(--gray);cursor:pointer;transition:.15s}
.ptab.on{background:var(--navy);color:#fff;border-color:var(--navy)}
.pnav{font-size:14px;padding:3px 7px;border:1px solid var(--brd2);border-radius:4px;background:var(--bg2);cursor:pointer;color:var(--navy);transition:.15s}
.pnav:hover{background:var(--bg3)}
.plabel{font-size:12px;font-weight:600;color:var(--navy);min-width:100px;text-align:center}
select.psel{font-size:11px;padding:4px 8px;border:1px solid var(--brd2);border-radius:4px;background:var(--bg2);color:var(--navy);font-family:var(--sans);outline:none;cursor:pointer}
select.psel:focus{border-color:var(--navy)}

/* ── PANES ── */
.pane{display:none;padding:12px 14px 28px}
.pane.on{display:block}

/* ── KPI ── */
.ks{display:grid;gap:10px;margin-bottom:12px}
.ks5{grid-template-columns:repeat(5,1fr)}
.ks4{grid-template-columns:repeat(4,1fr)}
.ks3{grid-template-columns:repeat(3,1fr)}
@media(max-width:880px){.ks5,.ks4{grid-template-columns:repeat(3,1fr)}.ks3{grid-template-columns:repeat(2,1fr)}}
@media(max-width:580px){.ks5,.ks4,.ks3{grid-template-columns:repeat(2,1fr)}}
.kpi{background:var(--bg2);border:1px solid var(--brd);border-radius:10px;padding:11px 13px;box-shadow:var(--sh);position:relative;overflow:hidden;transition:.15s}
.kpi:hover{box-shadow:var(--sh2)}
.kpi::before{content:'';position:absolute;left:0;top:0;bottom:0;width:4px;border-radius:4px 0 0 4px}
.kpi.nv::before{background:var(--navy)}.kpi.tl::before{background:var(--teal)}
.kpi.gd::before{background:var(--gold)}.kpi.rd::before{background:var(--red)}
.kpi.gn::before{background:var(--green)}.kpi.pu::before{background:var(--pu)}
.kpi.bl::before{background:var(--blue)}
.kl{font-size:9px;font-weight:600;color:var(--gray);text-transform:uppercase;letter-spacing:.5px;margin-bottom:3px}
.kv{font-size:24px;font-weight:700;color:var(--navy);line-height:1}
.ks2{font-size:10px;color:var(--gray);margin-top:3px}

/* ── CARDS ── */
.cg{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:10px;margin-bottom:12px}
.card{background:var(--bg2);border:1px solid var(--brd);border-radius:10px;padding:13px;box-shadow:var(--sh)}
.card-hd{font-size:11px;font-weight:700;color:var(--navy);margin-bottom:8px;display:flex;align-items:center;gap:6px}
.row{display:flex;justify-content:space-between;align-items:center;padding:3px 0;font-size:11px;border-bottom:1px solid var(--bg3)}
.row:last-child{border-bottom:none}
.row .lbl{color:var(--gray)}
.row .val{font-weight:700;color:var(--navy)}

/* ── TABLE ── */
.twrap{overflow-x:auto;border-radius:8px;border:1px solid var(--brd);margin-bottom:12px}
table{width:100%;border-collapse:collapse;background:var(--bg2);font-size:11.5px}
thead{background:var(--navy);color:#fff;position:sticky;top:0}
th{padding:8px 10px;text-align:left;font-size:10px;font-weight:700;letter-spacing:.3px;text-transform:uppercase;white-space:nowrap}
td{padding:6px 10px;border-bottom:1px solid var(--bg3);white-space:nowrap;color:var(--navy)}
tr:last-child td{border-bottom:none}
tr:hover td{background:var(--bg3)}
.badge{display:inline-block;font-size:10px;font-weight:700;padding:2px 7px;border-radius:3px}
.badge.ok{background:#dcfce7;color:#15803d}.badge.warn{background:#fef9c3;color:#92400e}
.badge.bad{background:#fee2e2;color:#b91c1c}.badge.info{background:#dbeafe;color:#1d4ed8}
.badge.muted{background:#f1f5f9;color:var(--gray)}

/* ── DIFF BARS ── */
.dbars{padding:4px 0}
.dbar{display:flex;align-items:center;gap:7px;padding:3px 0}
.dbar .dl{font-size:10px;color:var(--gray);width:55px;text-align:right;flex-shrink:0}
.dbar .dw{flex:1;height:13px;background:var(--bg3);border-radius:2px;overflow:hidden}
.dbar .da{height:100%;background:var(--navy);border-radius:2px;transition:width .4s}
.dbar .db{height:100%;background:var(--teal);border-radius:2px;transition:width .4s}
.dbar .dv{font-size:10px;color:var(--gray);width:70px;flex-shrink:0}

/* ── PANEL ── */
.panel{background:var(--bg2);border:1px solid var(--brd);border-radius:10px;padding:13px;margin-bottom:11px;box-shadow:var(--sh)}
.panel h3{font-size:12px;font-weight:700;color:var(--navy);margin-bottom:10px}
.stit{font-size:11px;font-weight:700;color:var(--navy);margin:13px 0 7px;display:flex;align-items:center;gap:6px}
.stit::after{content:'';flex:1;height:1px;background:var(--brd)}

/* ── UPLOAD ── */
.uzbox{border:2px dashed var(--brd2);border-radius:8px;background:var(--bg2);padding:16px;text-align:center;cursor:pointer;transition:.2s;margin-bottom:10px}
.uzbox:hover,.uzbox.drag{border-color:var(--gold);background:#d9770608}

/* ── STATUS DOT ── */
.dot{width:7px;height:7px;border-radius:50%;display:inline-block;flex-shrink:0}
.dot.ok{background:var(--green)}.dot.warn{background:var(--gold)}.dot.bad{background:var(--red)}.dot.off{background:var(--gray)}

/* ── CLOUD PANEL ── */
#cloudPanel{position:fixed;top:50px;right:0;width:340px;background:var(--bg2);border:1px solid var(--brd);border-right:none;border-radius:8px 0 0 8px;box-shadow:var(--sh2);padding:14px;z-index:250;transform:translateX(100%);transition:transform .25s}
#cloudPanel.open{transform:translateX(0)}
.cpRow{display:flex;gap:6px;align-items:center;margin-bottom:8px}
.cpLabel{font-size:10px;font-weight:600;color:var(--gray);width:60px;flex-shrink:0}
.cpInput{flex:1;font-size:11px;padding:4px 7px;border:1px solid var(--brd2);border-radius:4px;font-family:var(--sans);outline:none}
.cpBtn{font-size:11px;font-weight:600;padding:4px 9px;border-radius:4px;border:none;cursor:pointer;color:#fff;white-space:nowrap}
.cpBtn.sv{background:var(--navy)}.cpBtn.pl{background:var(--teal)}.cpBtn.ps{background:var(--blue)}
.cpStatus{font-size:10px;margin-top:4px;padding:4px 7px;border-radius:4px;font-family:monospace}
.cpStatus.ok{background:#dcfce7;color:#15803d}
.cpStatus.warn{background:#fef9c3;color:#92400e}
.cpStatus.err{background:#fee2e2;color:#b91c1c}
.cpStatus.info{background:#dbeafe;color:#1d4ed8}
.cpLog{font-size:10px;color:var(--gray);font-family:monospace;max-height:100px;overflow-y:auto;margin-top:6px;padding:4px;background:var(--bg3);border-radius:4px}

/* ── MODAL ── */
.mbg{display:none;position:fixed;inset:0;background:#0007;z-index:500;align-items:center;justify-content:center}
.mbg.show{display:flex}
.mbox{background:var(--bg2);border-radius:10px;padding:20px;max-width:420px;width:90%;box-shadow:0 8px 32px #0005}
.mbox h3{font-size:13px;font-weight:700;color:var(--navy);margin-bottom:12px}
.mbtns{display:flex;gap:7px;justify-content:flex-end;margin-top:14px}
.mbtn{font-size:11px;font-weight:600;padding:5px 13px;border-radius:4px;border:1px solid;cursor:pointer}
.mbtn.ok{background:var(--navy);color:#fff;border-color:var(--navy)}
.mbtn.cl{background:transparent;color:var(--gray);border-color:var(--brd2)}

/* ── TOAST ── */
#toast{position:fixed;bottom:18px;left:50%;transform:translateX(-50%);background:#1e3a5f;color:#fff;padding:8px 16px;border-radius:6px;font-size:12px;font-weight:600;opacity:0;transition:opacity .3s;z-index:1000;pointer-events:none}
#toast.show{opacity:1}

@media print{#hdr,#tabbar,#cloudPanel,button,select,.pbar .pnav,.pbar .ptab{display:none!important}.pane.on{display:block!important}body{background:#fff}}
</style>
</head>
<body>

<!-- HEADER -->
<div id="hdr">
  <div class="hlogo">
    <span class="hvrt">VRT</span>
    <span class="htit" id="htit">🔗 整合分析 Complete</span>
  </div>
  <div class="hright">
    <span class="sync-tip" id="syncTip"></span>
    <button class="hbtn lang on" id="btn-zh" onclick="setLang('zh')">中</button>
    <button class="hbtn lang"    id="btn-en" onclick="setLang('en')">EN</button>
    <button class="hbtn pull" onclick="doPull()" title="從雲端拉取 Pull from Cloud">☁↓</button>
    <button class="hbtn push" onclick="doPush()" title="推送至雲端 Push to Cloud">☁↑</button>
    <button class="hbtn" style="background:#7c3aed;color:#fff;border-color:#7c3aed" onclick="toggleCloud()">⚙ 雲端</button>
    <button class="hbtn prt" onclick="window.print()">🖨</button>
  </div>
</div>

<!-- CLOUD PANEL -->
<div id="cloudPanel">
  <div style="font-size:11px;font-weight:700;color:var(--navy);margin-bottom:10px">☁ 雲端設定</div>
  <div class="cpRow">
    <span class="cpLabel" id="cp-hra-lbl">HRA GAS</span>
    <input class="cpInput" id="hraGasInput" placeholder="https://script.google.com/macros/s/.../exec">
    <button class="cpBtn sv" onclick="saveGas('hra')">存</button>
  </div>
  <div class="cpRow">
    <span class="cpLabel" id="cp-prod-lbl">生產 GAS</span>
    <input class="cpInput" id="prodGasInput" placeholder="https://script.google.com/macros/s/.../exec">
    <button class="cpBtn sv" onclick="saveGas('prod')">存</button>
  </div>
  <div style="display:flex;gap:6px;margin-bottom:8px">
    <button class="cpBtn pl" onclick="doPull()" style="flex:1">☁↓ 拉取全部</button>
    <button class="cpBtn ps" onclick="doPush()" style="flex:1">☁↑ 推送</button>
    <button class="cpBtn" style="background:#6b7a9e" onclick="reloadAll()">🔄 讀取 IDB</button>
  </div>
  <div class="cpStatus info" id="cpStatus">尚未同步</div>
  <div class="cpLog" id="cpLog"></div>
</div>

<!-- TABS -->
<div id="tabbar">
  <button class="tab on" data-t="sum"  id="tab-sum">📊 <span data-i18n="navSum">總表</span></button>
  <button class="tab"    data-t="as"   id="tab-as">🔄 <span data-i18n="navAS">出勤×車縫</span></button>
  <button class="tab"    data-t="ac"   id="tab-ac">📋 <span data-i18n="navAC">出勤×入離職</span></button>
  <button class="tab"    data-t="am"   id="tab-am">🤰 <span data-i18n="navAM">出勤×孕假</span></button>
  <button class="tab"    data-t="list" id="tab-list">📁 <span data-i18n="navList">列表</span></button>
  <button class="tab"    data-t="cfg"  id="tab-cfg">⚙️ <span data-i18n="navCfg">設定</span></button>
</div>

<!-- ══ 總表 ══ -->
<div class="pane on" id="pane-sum">
  <div id="sum-pbar" class="pbar"></div>
  <div class="ks ks5" id="kpi-sum"></div>
  <div class="stit" id="stit-sum">📋 期間明細比較</div>
  <div id="sum-detail"></div>
  <div class="panel">
    <h3 id="chart-sum-title">📊 五系統人數比較</h3>
    <div style="height:260px;position:relative"><canvas id="chartSum"></canvas></div>
  </div>
</div>

<!-- ══ 出勤×車縫 ══ -->
<div class="pane" id="pane-as">
  <div id="as-pbar" class="pbar"></div>
  <div class="ks ks4" id="kpi-as"></div>
  <div id="as-detail"></div>
</div>

<!-- ══ 出勤×入離職 ══ -->
<div class="pane" id="pane-ac">
  <div id="ac-pbar" class="pbar"></div>
  <div class="ks ks4" id="kpi-ac"></div>
  <div id="ac-detail"></div>
</div>

<!-- ══ 出勤×孕假 ══ -->
<div class="pane" id="pane-am">
  <div id="am-pbar" class="pbar"></div>
  <div class="ks ks3" id="kpi-am"></div>
  <div id="am-detail"></div>
</div>

<!-- ══ 列表 ══ -->
<div class="pane" id="pane-list">
  <div class="pbar" style="gap:7px">
    <select class="psel" id="list-src" onchange="renderList()">
      <option value="att">考勤 Attendance</option>
      <option value="sew">車縫 Sewing</option>
      <option value="cont">合約 Contract</option>
      <option value="mat">孕假 Maternity</option>
    </select>
    <input class="psel" id="list-q" placeholder="搜尋 Search…" oninput="renderList()" style="min-width:150px">
    <select class="psel" id="list-period" onchange="renderList()"><option value="">— 全部期間 —</option></select>
    <button class="hbtn pull" onclick="addRec()">＋</button>
    <button class="hbtn" style="background:var(--red);color:#fff;border-color:var(--red)" onclick="delSelected()">🗑</button>
    <span id="list-cnt" style="font-size:10px;color:var(--gray);margin-left:auto"></span>
  </div>
  <div class="twrap">
    <table id="listTable">
      <thead><tr id="listTh"></tr></thead>
      <tbody id="listTb"></tbody>
    </table>
  </div>
</div>

<!-- ══ 設定 ══ -->
<div class="pane" id="pane-cfg">
  <div class="panel">
    <h3 id="cfg-status-title">🔗 資料來源狀態</h3>
    <div class="ks ks4" id="cfg-status-kpi"></div>
    <button class="cpBtn pl" style="margin-top:8px" onclick="reloadAll()">🔄 重新讀取外部 IDB</button>
  </div>
  <div class="panel">
    <h3 id="cfg-att-title">📥 考勤 Excel 匯入</h3>
    <div class="uzbox" id="attUz" onclick="document.getElementById('attFile').click()" ondrop="dropAtt(event)" ondragover="event.preventDefault()" ondragenter="this.classList.add('drag')" ondragleave="this.classList.remove('drag')">
      <div style="font-size:22px">📂</div>
      <div style="font-size:11px;color:var(--gray);margin-top:4px" id="uz-hint">拖入考勤 Excel / .msg 或點此選擇</div>
      <input type="file" id="attFile" accept=".xlsx,.xls,.msg" multiple style="display:none" onchange="importAtt(event)">
    </div>
    <div id="attLog" style="font-size:10px;color:var(--gray)"></div>
  </div>
  <div class="panel">
    <h3>💾 備份/還原</h3>
    <div style="display:flex;gap:7px">
      <button class="cpBtn sv" onclick="exportJSON()">📦 匯出 JSON</button>
      <button class="cpBtn pl" onclick="document.getElementById('restoreFile').click()">📂 還原 JSON</button>
      <input type="file" id="restoreFile" accept=".json" style="display:none" onchange="restoreJSON(event)">
    </div>
    <details style="margin-top:10px">
      <summary style="font-size:10px;color:var(--gray);cursor:pointer">⚠ 清除資料</summary>
      <button class="cpBtn" style="background:var(--red);margin-top:8px" onclick="clearAtt()">清除考勤</button>
    </details>
  </div>
</div>

<!-- 新增 Modal -->
<div class="mbg" id="addModal">
  <div class="mbox">
    <h3 id="modal-add-title">＋ 新增考勤記錄</h3>
    <div style="display:flex;flex-direction:column;gap:7px">
      <input class="cpInput" id="add-date" type="date" style="width:100%">
      <input class="cpInput" id="add-line" placeholder="組別/線 (e.g. Line 1, L1)" style="width:100%">
      <input class="cpInput" id="add-hc"     type="number" placeholder="在職人數 HC" style="width:100%">
      <input class="cpInput" id="add-att"    type="number" placeholder="出勤人數 Att" style="width:100%">
      <input class="cpInput" id="add-join"   type="number" placeholder="新進 Join" style="width:100%">
      <input class="cpInput" id="add-resign" type="number" placeholder="離職 Resign" style="width:100%">
    </div>
    <div class="mbtns">
      <button class="mbtn cl" onclick="document.getElementById('addModal').classList.remove('show')">取消</button>
      <button class="mbtn ok" onclick="saveRec()">儲存</button>
    </div>
  </div>
</div>
<div id="toast"></div>

<!-- ═══════════════════════════════════════════════════════════
     JAVASCRIPT
═══════════════════════════════════════════════════════════ -->
<script>
'use strict';

// ── GAS URL keys ──────────────────────────────────────────────
const LS_HRA_GAS  = 'vrt_att_cloud_v1_url';    // 考勤/合約/孕假 GAS（AC HRA CloudSync）
const LS_PROD_GAS = 'vrt_portal_gas_url';       // 生產 GAS（VRT Portal / sewing）
const LS_ATT      = 'vrt_complete_att';         // 本工具自存的考勤資料

// ── IDB 連接設定（仿 sewing 讀 cutting 的方式）──────────────
const IDB_ATT  = [{db:'AC_HRA_Attendance', ver:1, store:'records'}];
const IDB_SEW  = [{db:'SewingCloudProd',   ver:1, store:'cloud_records'}];
const IDB_CONT = [
  {db:'vrt_contract_db', ver:1, store:'dashConts'},
  {db:'ContractDB',      ver:1, store:'dashConts'},
];
const IDB_PROB = [
  {db:'vrt_contract_db', ver:1, store:'dashProbs'},
  {db:'ContractDB',      ver:1, store:'dashProbs'},
];

// ── 全域資料 ──────────────────────────────────────────────────
let ATT_DB  = [];   // [{date,line,lineRaw,hc,att,join,resign,ml,al,pl,sl,np}]
let SEW_DB  = [];   // [{date,section,line,lineRaw,workers,pieces,eff}]
let CONT_DB = [];   // dashConts records
let PROB_DB = [];   // dashProbs records
let MAT_DB  = [];   // maternity employees

// ── 期間狀態 ──────────────────────────────────────────────────
const PS = {
  sum:{m:'month',idx:0,list:[]},
  as: {m:'month',idx:0,list:[]},
  ac: {m:'month',idx:0,list:[]},
  am: {m:'month',idx:0,list:[]},
};

let VIEW = 'card';
let LANG = 'zh';
let chartSum = null;

// ── i18n 詞典 ─────────────────────────────────────────────────

// ═══════════════════════════════════════════════════════════
//  IDB READER (仿 sewing 讀 cutting 的 pattern)
// ═══════════════════════════════════════════════════════════
async function readIDB(attempts) {
  for (const {db, ver, store} of attempts) {
    try {
      const result = await new Promise(res => {
        const req = indexedDB.open(db, ver);
        req.onupgradeneeded = e => {
          const d = e.target.result;
          if (!d.objectStoreNames.contains(store))
            d.createObjectStore(store, {keyPath:'id', autoIncrement:true});
        };
        req.onerror  = () => res([]);
        req.onblocked = () => res([]);
        req.onsuccess = e => {
          const d = e.target.result;
          if (!d.objectStoreNames.contains(store)) { d.close(); res([]); return; }
          try {
            const all = [];
            const cursor = d.transaction(store,'readonly').objectStore(store).openCursor();
            cursor.onsuccess = ev => {
              if (ev.target.result) { all.push(ev.target.result.value); ev.target.result.continue(); }
              else { d.close(); res(all); }
            };
            cursor.onerror = () => { d.close(); res([]); };
          } catch(e2) { d.close(); res([]); }
        };
      });
      if (result.length > 0) return result;
    } catch(e) {}
  }
  return [];
}

    try {
      const attData = await pullTool(hraUrl, 'attendance');
      if (attData.length) {
        ATT_DB = attData.map(r=>{
          const rawLine=r.lineNo||r.group||r.section||r.line||'';
          const lineN=normLine(rawLine);
          if(!r.date||!rawLine||lineN==='?'||/grand|total|ttl|^all$/i.test(rawLine))return null;
          return {date:r.date,line:lineN,lineRaw:rawLine,
            hc:+r.ttl||+r.hc||(+r.m||0)+(+r.f||0)||0,

            ml:+r.ml||0,al:+r.al||0,pl:+r.pl||0,sl:+r.sl||0,np:+r.np||0};
        }).filter(Boolean);

        cpLog(`考勤 ${ATT_DB.length} 筆 ✓`, 'ok');
      }
    } catch(e) { cpLog('考勤拉取失敗：' + e.message); }

      const contData = await pullTool(hraUrl, 'contract');
      if (contData.length) { CONT_DB = contData; cpLog(`合約 ${CONT_DB.length} 筆 ✓`, 'ok'); }
    } catch(e) { cpLog('合約拉取失敗：' + e.message); }

    // 拉取孕假
    try {
      const matData = await pullTool(hraUrl, 'maternity');
      if (matData.length) {

    } catch(e) { cpLog('車縫拉取失敗（Production GAS）：' + e.message); }

  rebuildPeriods();
  renderAll();
  updateCfgKpis();
  const ts = new Date().toLocaleTimeString();
  setSyncTip(`☁ 同步完成 ${ts}`, 'ok');
  toast(`✅ 拉取完成，共 ${total} 筆`);
}

// GAS chunked pull（與 sewing 一樣的 meta+chunk 模式）
async function pullTool(gasUrl, tool) {
  const mr = await fetch(`${gasUrl}?action=pull&tool=${tool}&meta=1`, {method:'GET', redirect:'follow'});
  const md = await mr.json();
  if (!md.ok || !md.data) return [];

  if (md.data.chunked) {
    const total = md.data.meta.totalChunks;
    let all = [];
    for (let i = 0; i < total; i++) {
      for (let t2 = 0; t2 < 3; t2++) {
        try {
          const cr = await fetch(`${gasUrl}?action=pull&tool=${tool}&chunk=${i}`, {method:'GET', redirect:'follow'});
          const cd = await cr.json();
          if (cd.ok) { all = all.concat(cd.data.records||[]); break; }
        } catch(e) { if (t2===2) throw e; await new Promise(r=>setTimeout(r,2000)); }
      }
    }
    return all;
  }
  // Non-chunked
  const payload = md.data.data;
  if (!payload) return [];
  if (payload.records) return payload.records;
  const lsKey = {attendance:'vrt_att_v5_db', sewing:'sewing_prod_v1', maternity:'vrt_maternity_v1'}[tool];
  if (lsKey && payload.lsKeys?.[lsKey]) return JSON.parse(payload.lsKeys[lsKey]);
  return [];
}

// ═══════════════════════════════════════════════════════════
//  LINE / DEPT NORMALISATION
// ═══════════════════════════════════════════════════════════
function normLine(s) {
  const v = String(s||'').toLowerCase()
    .replace(/[^\w\d]/g,'').replace(/^garment/,'').replace(/^sewing/,'')
    .replace(/^apron/,'ap').replace(/^cutting/,'cut')
    .replace(/^line/,'').replace(/^l0*/,'');
  const num = parseInt(v, 10);
  if (!isNaN(num) && num > 0 && num <= 60) return 'L' + num;
  const ma = v.match(/^([a-z])0*(\d+)$/);
  if (ma) return ma[1].toUpperCase() + parseInt(ma[2], 10);
  if(v.length>=1&&v.length<=10) return v.slice(0,10).toUpperCase();
  return '?';
}
function normDept(s) {
  const v = String(s||'').toLowerCase();
  if (/product|garment|sewing/i.test(v)) return 'Production';
  if (/qc|quality/i.test(v)) return 'QC';
  if (/cut/i.test(v)) return 'Cutting';
  if (/maint|mech/i.test(v)) return 'Maintenance';
  if (/office|admin/i.test(v)) return 'Admin';
  if (/pack/i.test(v)) return 'Packing';
  if (/store|ware/i.test(v)) return 'Warehouse';
  return String(s||'').trim() || '(other)';
}

// ── 期間聚合輔助（月/週/年→每日平均，日→合計）──────────
function aggHC(recs, line) {
  const lr = line ? recs.filter(r=>r.line===line) : recs;
  if (!lr.length) return 0;
  const byDate = {};
  lr.forEach(r => { byDate[r.date] = (byDate[r.date]||0) + (+r.hc||0); });
  const days = Object.keys(byDate).length;
  return Math.round(Object.values(byDate).reduce((s,v)=>s+v,0) / Math.max(1,days));
}
function aggSewW(recs, line) {
  const lr = line ? recs.filter(r=>r.line===line) : recs;
  if (!lr.length) return 0;
  const byDate = {};
  lr.forEach(r => { byDate[r.date] = (byDate[r.date]||0) + (+r.workers||0); });
  const days = Object.keys(byDate).length;
  return Math.round(Object.values(byDate).reduce((s,v)=>s+v,0) / Math.max(1,days));
}
// ═══════════════════════════════════════════════════════════
//  PERIOD HELPERS
// ═══════════════════════════════════════════════════════════
function periodKey(d, mode) {
  if (!d) return '?';
  if (mode === 'day')   return String(d).slice(0,10);
  if (mode === 'month') return String(d).slice(0,7);
  if (mode === 'year')  return String(d).slice(0,4);
  if (mode === 'week') {
    const dt = new Date(d), jan = new Date(dt.getFullYear(),0,1);
    const w = Math.ceil(((dt-jan)/86400000+jan.getDay()+1)/7);
    return `${dt.getFullYear()}-W${String(w).padStart(2,'0')}`;
  }
  return String(d).slice(0,10);
}
function allDates() {
  return [
    ...ATT_DB.map(r=>r.date), ...SEW_DB.map(r=>r.date),
    ...CONT_DB.map(r=>r.entryDate).filter(Boolean),
    ...MAT_DB.filter(e=>e.leaveStart).map(e=>e.leaveStart),
  ].filter(Boolean);
}
function buildList(mode) {
  return [...new Set(allDates().map(d=>periodKey(d,mode)).filter(k=>k!=='?'))].sort();
}
function rebuildPeriods() {
  for (const [k,P] of Object.entries(PS)) {
    P.list = buildList(P.m);
    if (P.idx < 0 || P.idx >= P.list.length) P.idx = Math.max(0, P.list.length-1);
  }
}
function curKey(pk) {
  const P = PS[pk];
  return P.list[Math.max(0,Math.min(P.idx,P.list.length-1))] || null;
}
function pLabel(key, mode) {
  if (!key) return '—';
  if (mode==='week') { const [y,w]=key.split('-W'); return `${y} W${parseInt(w)}`; }
  if (mode==='month') { const [y,m]=key.split('-'); const mn=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][parseInt(m)-1]; return `${y} ${mn}`; }
  return key;
}
function inP(d, pk) {
  const k = curKey(pk); if (!k||!d) return true;
  return periodKey(d, PS[pk].m) === k;
}

const _filters = {};
function saveFilter(pk,type,val){if(!_filters[pk])_filters[pk]={};_filters[pk][type]=val;}
function getSavedFilter(pk,type){return _filters[pk]?.[type]||'';}
function jumpPeriod(pk,key){const P=PS[pk],i=P.list.indexOf(key);if(i>=0){P.idx=i;renderPk(pk);}}
function setPM(pk, mode) { PS[pk].m=mode; PS[pk].list=buildList(mode); PS[pk].idx=Math.max(0,PS[pk].list.length-1); renderPk(pk); }
function navP(pk, d) { const P=PS[pk]; P.idx=Math.max(0,Math.min(P.idx+d,P.list.length-1)); renderPk(pk); }
function renderPk(pk) { if(pk==='sum')renderSum(); else if(pk==='as')renderAS(); else if(pk==='ac')renderAC(); else if(pk==='am')renderAM(); }

function getAllLines() {
  return [...new Set([...ATT_DB.map(r=>r.line),...SEW_DB.map(r=>r.line)])].sort((a,b)=>{
    const na=parseInt(a.slice(1)||0), nb=parseInt(b.slice(1)||0); return na-nb||a.localeCompare(b);
  });
}
function getAllDepts() {
  return [...new Set([...ATT_DB.map(r=>normDept(r.lineRaw||r.line)),...CONT_DB.map(r=>normDept(r.dept||'')),...MAT_DB.map(e=>normDept(e.dept||''))])].sort();
}

function getLineFilter(pk)  { return getSavedFilter(pk,'line'); }
function getDeptFilter(pk)  { return getSavedFilter(pk,'dept'); }

// ═══════════════════════════════════════════════════════════
//  AGG
// ═══════════════════════════════════════════════════════════
function aggA(recs) {
  return {
    hc: recs.reduce((s,r)=>s+(+r.hc||0),0),
    att: recs.reduce((s,r)=>s+(+r.att||0),0),
    join: recs.reduce((s,r)=>s+(+r.join||0),0),
    resign: recs.reduce((s,r)=>s+(+r.resign||0),0),
    ml: recs.reduce((s,r)=>s+(+r.ml||0),0),
    days: new Set(recs.map(r=>r.date)).size,
  };
}
function aggS(recs) {
  return {
    workers: recs.reduce((s,r)=>s+(+r.workers||0),0),
    pieces: recs.reduce((s,r)=>s+(+r.pieces||0),0),
    eff: recs.length ? (recs.reduce((s,r)=>s+(+r.eff||0),0)/recs.length).toFixed(1) : '—',
    days: new Set(recs.map(r=>r.date)).size,
  };
}
function diffCls(diff, base) {
  if (!base) return 'muted'; const p=Math.abs(diff)/base*100;
  return p<=3?'ok':p<=10?'warn':'bad';
}
function diffBadge(d) {
  const s=d>=0?'+':'', cls=d===0?'ok':Math.abs(d)<=5?'warn':'bad';
  return `<span class="badge ${cls}">${s}${d}</span>`;
}

        <div class="row"><span class="lbl">${t('sewWk')}</span><span class="val">${lsw||'—'}</span></div>

    html+='</div>';
  } else {
    html=`<div class="twrap"><table><thead><tr>
      <th>${t('line')}</th><th>${t('attHC')}</th><th>${t('sewWk')}</th><th>${t('diff')}</th><th>${t('rate')}</th><th>${t('join')}</th><th>${t('resign')}</th><th>${t('status')}</th>
    </tr></thead><tbody>${allLines.map(line=>{
      const la=attR.filter(r=>r.line===line), ls=sewR.filter(r=>r.line===line);

      const diff=lahc-lsw, pct=lsw?(diff/lsw*100).toFixed(1)+'%':'—', dc=diffCls(diff,Math.max(lahc,lsw));
      return `<tr><td><b>${line}</b></td><td>${lahc}</td><td>${lsw||'—'}</td><td>${diffBadge(diff)}</td><td>${pct}</td>

  }
  document.getElementById('sum-detail').innerHTML = html;

  // Chart
  const labels=allLines.slice(0,16);
  if (chartSum) chartSum.destroy();
  chartSum = new Chart(document.getElementById('chartSum').getContext('2d'), {
    type:'bar',
    data:{labels, datasets:[
      {label:t('attHC'), data:labels.map(l=>attR.filter(r=>r.line===l).reduce((s,r)=>s+(+r.hc||0),0)), backgroundColor:'rgba(30,58,95,.75)', borderRadius:4, borderSkipped:false},
      {label:t('sewWk'), data:labels.map(l=>sewR.filter(r=>r.line===l).reduce((s,r)=>s+(+r.workers||0),0)), backgroundColor:'rgba(15,118,110,.7)', borderRadius:4, borderSkipped:false},
    ]},
    options:{responsive:true,maintainAspectRatio:false,
      plugins:{legend:{position:'bottom',labels:{font:{size:10}}}},
      scales:{x:{ticks:{font:{size:9}}},y:{beginAtZero:true,ticks:{font:{size:10}}}}}
  });
}

        <div class="row"><span class="lbl">${t('diff')}</span><span class="val">${diffBadge(diff2)}</span></div>
        <div class="row"><span class="lbl">效率 Eff%</span><span class="val">${effAvg}%</span></div>
        <div class="row"><span class="lbl">產量 Pcs</span><span class="val">${ls.reduce((s,r)=>s+(+r.pieces||0),0)||'—'}</span></div>
      </div>`;
    });
    html+='</div>';
    // Diff bar
    html+='<div class="panel"><h3>📊 差異圖</h3><div class="dbars">';
    allLines.forEach(line=>{
      const lahc=aggHC(attR,line);
      const lsw=aggSewW(sewR,line);
      html+=`<div class="dbar"><span class="dl">${line}</span>
        <div class="dw"><div class="da" style="width:${(lahc/maxV*100).toFixed(1)}%"></div></div>
        <div class="dw" style="flex:.7"><div class="db" style="width:${(lsw/maxV*100).toFixed(1)}%"></div></div>
        <span class="dv">${lahc}/${lsw||'—'}</span></div>`;
    });
    html+='</div></div>';
  } else {
    html=`<div class="twrap"><table><thead><tr>
      <th>${t('line')}</th><th>${t('attHC')}</th><th>${t('sewWk')}</th><th>${t('diff')}</th><th>${t('rate')}</th><th>Eff%</th><th>Pcs</th><th>${t('status')}</th>
    </tr></thead><tbody>${allLines.map(line=>{
      const la=attR.filter(r=>r.line===line), ls=sewR.filter(r=>r.line===line);
      const lahc=aggHC(attR,line), lsw=aggSewW(sewR,line);
      const d2=lahc-lsw, pct=lsw?(d2/lsw*100).toFixed(1)+'%':'—', dc=diffCls(d2,Math.max(lahc,lsw));
      const eff=ls.length?(ls.reduce((s,r)=>s+(+r.eff||0),0)/ls.length).toFixed(1):'—';

// ═══════════════════════════════════════════════════════════
//  TAB 3：出勤×入離職
// ═══════════════════════════════════════════════════════════
function renderAC() {
  document.getElementById('ac-pbar').innerHTML = pbarHtml('ac','renderAC()');
  const cur=curKey('ac'), P=PS.ac;
  if(!cur){document.getElementById('ac-detail').innerHTML='<div style="color:var(--gray);padding:20px">無資料</div>';return;}
  const attR=ATT_DB.filter(r=>inP(r.date,'ac'));
  // 考勤新進/離職
  const aJ=attR.reduce((s,r)=>s+(+r.join||0),0);
  const aR=attR.reduce((s,r)=>s+(+r.resign||0),0);
  const aRatio=aJ>0?(aR/aJ*100).toFixed(1):'—';
  // 合約/試用
  const contR=CONT_DB.filter(r=>r.entryDate&&inP(r.entryDate,'ac'));
  const probR=PROB_DB.filter(r=>r.joinDate&&inP(r.joinDate,'ac'));
  // 各部門考勤新進離職
  const deptAtt=new Map();
  attR.forEach(r=>{
    const d=normDept(r.lineRaw||r.line);
    if(!deptAtt.has(d))deptAtt.set(d,{j:0,r:0,lines:new Set()});
    deptAtt.get(d).j+=(+r.join||0); deptAtt.get(d).r+=(+r.resign||0); deptAtt.get(d).lines.add(r.line);
  });
  // 各部門合約新進
  const deptCont=new Map();
  contR.forEach(r=>{const d=normDept(r.dept); if(!deptCont.has(d))deptCont.set(d,{j:0,ids:[]}); deptCont.get(d).j++; deptCont.get(d).ids.push(r.factoryId||'');});
  const allDepts=[...new Set([...deptAtt.keys(),...deptCont.keys()])].sort();

  document.getElementById('kpi-ac').innerHTML=[
    {l:`考勤 ${t('join')}`,v:aJ,c:'nv'},{l:`考勤 ${t('resign')}`,v:aR,c:'rd'},
    {l:'入/離職比',v:aRatio+'%',c:aRatio==='—'?'gray':+aRatio<=30?'gn':'gd'},
    {l:`合約新進 / 試用`,v:`${contR.length} / ${probR.length}`,c:'tl'},
  ].map(k=>`<div class="kpi ${k.c}"><div class="kl">${k.l}</div><div class="kv">${k.v}</div></div>`).join('');

  let html='';
  if (VIEW==='card') {
    html='<div class="cg">';
    html+=`<div class="card"><div class="card-hd">📊 ${pLabel(cur,P.m)}</div>
      <div class="row"><span class="lbl">考勤 ${t('join')}</span><span class="val">${aJ}</span></div>
      <div class="row"><span class="lbl">考勤 ${t('resign')}</span><span class="val">${aR}</span></div>
      <div class="row"><span class="lbl">入/離職比</span><span class="val">${aRatio}%</span></div>
      <div class="row"><span class="lbl">合約新進</span><span class="val">${contR.length}</span></div>
      <div class="row"><span class="lbl">考-合 差異</span><span class="val">${diffBadge(aJ-contR.length)}</span></div>
      <div class="row"><span class="lbl">試用新增</span><span class="val">${probR.length}</span></div>
    </div>`;
    allDepts.forEach(dept=>{
      const da=deptAtt.get(dept)||{j:0,r:0,lines:new Set()};
      const dc2=deptCont.get(dept)||{j:0,ids:[]};
      const ratio=da.j>0?(da.r/da.j*100).toFixed(1):'—';
      const diff2=da.j-dc2.j, dcls=diffCls(diff2,Math.max(da.j,dc2.j));
      html+=`<div class="card"><div class="card-hd"><span class="dot ${dcls}"></span> 🏭 ${dept}</div>
        <div class="row"><span class="lbl">考勤 ${t('join')}</span><span class="val">${da.j}</span></div>
        <div class="row"><span class="lbl">考勤 ${t('resign')}</span><span class="val">${da.r}</span></div>
        <div class="row"><span class="lbl">入/離職比</span><span class="val" style="color:${+ratio>50?'var(--red)':'var(--navy)'}">${ratio}%</span></div>
        <div class="row"><span class="lbl">合約新進</span><span class="val">${dc2.j}</span></div>
        <div class="row"><span class="lbl">差異</span><span class="val">${diffBadge(diff2)}</span></div>
        <div class="row"><span class="lbl">組別</span><span class="val" style="font-size:10px">${[...da.lines].slice(0,4).join(', ')}</span></div>
      </div>`;
    });
    html+='</div>';
  } else {
    html=`<div class="twrap"><table><thead><tr>
      <th>${t('dept')}</th><th>考勤 ${t('join')}</th><th>考勤 ${t('resign')}</th><th>入/離職比</th><th>合約新進</th><th>差異</th>
    </tr></thead><tbody>${allDepts.map(dept=>{
      const da=deptAtt.get(dept)||{j:0,r:0}; const dc2=deptCont.get(dept)||{j:0};
      const ratio=da.j>0?(da.r/da.j*100).toFixed(1)+'%':'—';
      return `<tr><td><b>${dept}</b></td><td>${da.j}</td><td>${da.r}</td><td style="color:${+ratio>50?'var(--red)':'var(--navy)'};font-weight:700">${ratio}</td><td>${dc2.j}</td><td>${diffBadge(da.j-dc2.j)}</td></tr>`;
    }).join('')||'<tr><td colspan="6" style="color:var(--gray);text-align:center;padding:20px">無資料</td></tr>'}</tbody></table></div>
    <div class="twrap" style="margin-top:8px"><table><thead><tr>
      <th>廠號</th><th>姓名</th><th>${t('dept')}</th><th>${t('line')}</th><th>入職日</th><th>${t('contract')}</th>
    </tr></thead><tbody>${contR.map(r=>`<tr><td>${r.factoryId||'—'}</td><td>${r.name||'—'}</td><td>${r.dept||'—'}</td><td>${r.section||'—'}</td><td>${r.entryDate||'—'}</td><td><span class="badge info">${r.contractType||'—'}</span></td></tr>`).join('')||'<tr><td colspan="6" style="color:var(--gray);text-align:center;padding:20px">無合約資料</td></tr>'}</tbody></table></div>`;
  }
  document.getElementById('ac-detail').innerHTML = html;
}

// ═══════════════════════════════════════════════════════════
//  TAB 4：出勤×孕假
// ═══════════════════════════════════════════════════════════
function renderAM() {
  document.getElementById('am-pbar').innerHTML = pbarHtml('am','renderAM()');
  const cur=curKey('am'), df=getDeptFilter('am');
  if(!cur){document.getElementById('am-detail').innerHTML='<div style="color:var(--gray);padding:20px">無資料</div>';return;}
  const attR=ATT_DB.filter(r=>inP(r.date,'am')&&(!df||normDept(r.lineRaw||r.line)===df));
  const matAll=MAT_DB, matPrg=matAll.filter(e=>e.status==='pregnant').length, matMat=matAll.filter(e=>e.status==='maternity').length;
  const attML=attR.reduce((s,r)=>s+(+r.ml||0),0);
  document.getElementById('kpi-am').innerHTML=[
    {l:t('preg'),v:matPrg,c:'pu'},{l:t('mat'),v:matMat,c:'rd'},{l:`${t('ml')} (${t('attHC')})`,v:attML,c:'gd'},
  ].map(k=>`<div class="kpi ${k.c}"><div class="kl">${k.l}</div><div class="kv">${k.v}</div></div>`).join('');

  const dm=new Map();
  matAll.filter(e=>e.dept).forEach(e=>{const d=normDept(e.dept||''); if(!dm.has(d))dm.set(d,{preg:0,mat:0,ret:0}); const v=dm.get(d); if(e.status==='pregnant')v.preg++; else if(e.status==='maternity')v.mat++; else if(e.status==='returned')v.ret++; });
  const byLine=new Map();
  attR.filter(r=>r.line&&r.line!=='?').forEach(r=>{if(!byLine.has(r.line))byLine.set(r.line,{hc:0,ml:0,d:new Set()}); const v=byLine.get(r.line); v.hc+=(+r.hc||0); v.ml+=(+r.ml||0); v.d.add(r.date);});

  let html='';
  if (VIEW==='card') {
    html='<div class="cg">';
    [...dm.entries()].sort((a,b)=>(b[1].preg+b[1].mat)-(a[1].preg+a[1].mat)).forEach(([d,v])=>{
      const dML=attR.filter(r=>normDept(r.lineRaw||r.line)===d).reduce((s,r)=>s+(+r.ml||0),0);
      const tot=v.preg+v.mat, diff=dML-tot, dc=diffCls(diff,Math.max(dML,tot));
      html+=`<div class="card"><div class="card-hd"><span class="dot ${dc}"></span> 🏭 ${d}</div>
        <div class="row"><span class="lbl">🤰 ${t('preg')}</span><span class="val">${v.preg}</span></div>
        <div class="row"><span class="lbl">🍼 ${t('mat')}</span><span class="val">${v.mat}</span></div>
        <div class="row"><span class="lbl">✅ ${t('ret')}</span><span class="val">${v.ret||0}</span></div>
        <div class="row"><span class="lbl">${t('ml')} (考勤)</span><span class="val">${dML}</span></div>
        <div class="row"><span class="lbl">${t('diff')}</span><span class="val">${diffBadge(diff)}</span></div>
      </div>`;
    });
    [...byLine.entries()].filter(([,v])=>v.ml>0).sort().forEach(([l,v])=>{
      html+=`<div class="card"><div class="card-hd">📋 ${l}</div>
        <div class="row"><span class="lbl">均在職</span><span class="val">${v.d.size?Math.round(v.hc/v.d.size):v.hc}</span></div>
        <div class="row"><span class="lbl">${t('ml')} 天次</span><span class="val" style="color:var(--pu);font-weight:700">${v.ml}</span></div>
        <div class="row"><span class="lbl">天數</span><span class="val">${v.d.size}</span></div>
      </div>`;
    });
    html+='</div>';
  } else {
    html=`<div class="twrap"><table><thead><tr>
      <th>${t('dept')}</th><th>🤰${t('preg')}</th><th>🍼${t('mat')}</th><th>✅${t('ret')}</th><th>${t('ml')} (考勤)</th><th>${t('diff')}</th>
    </tr></thead><tbody>${[...dm.entries()].map(([d,v])=>{
      const dML=attR.filter(r=>normDept(r.lineRaw||r.line)===d).reduce((s,r)=>s+(+r.ml||0),0);
      return `<tr><td><b>${d}</b></td><td>${v.preg}</td><td>${v.mat}</td><td>${v.ret||0}</td><td>${dML}</td><td>${diffBadge(dML-(v.preg+v.mat))}</td></tr>`;
    }).join('')||'<tr><td colspan="6" style="color:var(--gray);text-align:center;padding:20px">無孕假資料</td></tr>'}</tbody></table></div>
    <div class="twrap" style="margin-top:8px"><table><thead><tr>
      <th>${t('line')}</th><th>均在職</th><th>${t('ml')} 天次</th><th>天數</th>
    </tr></thead><tbody>${[...byLine.entries()].filter(([,v])=>v.ml>0).map(([l,v])=>`<tr><td>${l}</td><td>${v.d.size?Math.round(v.hc/v.d.size):v.hc}</td><td style="color:var(--pu);font-weight:700">${v.ml}</td><td>${v.d.size}</td></tr>`).join('')||'<tr><td colspan="4" style="color:var(--gray);text-align:center;padding:20px">無 ML 請假資料</td></tr>'}</tbody></table></div>`;
  }
  document.getElementById('am-detail').innerHTML = html;
}

// ═══════════════════════════════════════════════════════════
//  TAB 5：列表

function renderList() {
  const src=document.getElementById('list-src')?.value||'att';
  const q=(document.getElementById('list-q')?.value||'').toLowerCase();
  const period=document.getElementById('list-period')?.value||'';
  let rows=[], headers=[];
  if (src==='att') {
    headers=['','日期','線別','在職','出勤','新進','離職','ML'];
    rows=ATT_DB.filter(r=>(!period||r.date.startsWith(period))&&(!q||(r.date+r.line+r.lineRaw).toLowerCase().includes(q))).sort((a,b)=>a.date.localeCompare(b.date)||a.line.localeCompare(b.line));
  } else if (src==='sew') {
    headers=['日期','線別','原始名稱','工人','產量','效率%','Section'];
    rows=SEW_DB.filter(r=>(!period||r.date.startsWith(period))&&(!q||(r.date+r.line+r.lineRaw).toLowerCase().includes(q))).sort((a,b)=>a.date.localeCompare(b.date)||a.line.localeCompare(b.line));
  } else if (src==='cont') {
    headers=['廠號','姓名','部門','組別/線','入職日','合約類型','到期日'];
    rows=CONT_DB.filter(r=>!q||(r.factoryId+r.name+r.dept+r.section).toLowerCase().includes(q));
  } else {
    headers=['姓名','部門','狀態','預產期','請假日','復工日'];
    rows=MAT_DB.filter(e=>!q||(e.name+e.dept).toLowerCase().includes(q));
  }
  document.getElementById('list-cnt').textContent=`${rows.length} 筆`;
  document.getElementById('listTh').innerHTML=(src==='att'?headers.map((h,i)=>i===0?`<th><input type="checkbox" onchange="toggleAll(this)"></th>`:` <th>${h}</th>`):headers.map(h=>`<th>${h}</th>`)).join('');
  let tb='';
  if (src==='att') tb=rows.map((r,i)=>`<tr data-i="${i}"><td><input type="checkbox" class="rcb"></td><td>${r.date}</td><td><b>${r.line}</b></td><td>${r.hc}</td><td>${r.att}</td><td>${r.join}</td><td>${r.resign}</td><td>${r.ml}</td></tr>`).join('');
  else if (src==='sew') tb=rows.map(r=>`<tr><td>${r.date}</td><td><b>${r.line}</b></td><td>${r.lineRaw}</td><td>${r.workers}</td><td>${r.pieces}</td><td>${r.eff}</td><td>${r.section}</td></tr>`).join('');
  else if (src==='cont') tb=rows.map(r=>`<tr><td>${r.factoryId||'—'}</td><td>${r.name||'—'}</td><td>${r.dept||'—'}</td><td>${r.section||'—'}</td><td>${r.entryDate||'—'}</td><td><span class="badge info">${r.contractType||'—'}</span></td><td>${r.endDate||'—'}</td></tr>`).join('');
  else tb=rows.map(e=>`<tr><td>${e.name||'—'}</td><td>${e.dept||'—'}</td><td><span class="badge ${e.status==='maternity'?'warn':e.status==='pregnant'?'info':'ok'}">${e.status||'—'}</span></td><td>${e.edd||'—'}</td><td>${e.leaveStart||'—'}</td><td>${e.returnDate||'—'}</td></tr>`).join('');
  document.getElementById('listTb').innerHTML=tb||'<tr><td colspan="9" style="color:var(--gray);text-align:center;padding:20px">無資料</td></tr>';
  const pSel=document.getElementById('list-period');
  if (pSel&&src==='att'){const cv=pSel.value,ms=[...new Set(ATT_DB.map(r=>r.date.slice(0,7)))].sort().reverse();pSel.innerHTML='<option value="">— 全部 —</option>'+ms.map(m=>`<option${m===cv?' selected':''}>${m}</option>`).join('');}
}
function toggleAll(cb){document.querySelectorAll('.rcb').forEach(c=>c.checked=cb.checked);}
function addRec(){document.getElementById('add-date').value=new Date().toISOString().slice(0,10);document.getElementById('addModal').classList.add('show');}
function saveRec(){
  const date=document.getElementById('add-date').value,lr=document.getElementById('add-line').value.trim();
  if(!date||!lr){toast('請填寫日期和組別');return;}
  ATT_DB.push({id:'m'+Date.now(),date,line:normLine(lr),lineRaw:lr,hc:parseInt(document.getElementById('add-hc').value)||0,att:parseInt(document.getElementById('add-att').value)||0,join:parseInt(document.getElementById('add-join').value)||0,resign:parseInt(document.getElementById('add-resign').value)||0,ml:0,al:0,pl:0,sl:0,np:0});
  saveAttLS();rebuildPeriods();document.getElementById('addModal').classList.remove('show');renderAll();toast('✅ 已新增');
}
function delSelected(){
  if(document.getElementById('list-src')?.value!=='att'){toast('目前只支援刪除考勤記錄');return;}
  const idxs=new Set([...document.querySelectorAll('.rcb:checked')].map(cb=>parseInt(cb.closest('tr').dataset.i)));
  if(!idxs.size){toast('請先勾選記錄');return;}
  if(!confirm(`確定刪除 ${idxs.size} 筆？`))return;
  ATT_DB=ATT_DB.filter((_,i)=>!idxs.has(i));saveAttLS();renderList();toast(`✅ 已刪除 ${idxs.size} 筆`);
}

  document.getElementById('cfg-status-kpi').innerHTML=[

    {l:t('cfg_sew'), v:SEW_DB.length, s:'SewingCloudProd IDB', c:'tl'},

}

// ═══════════════════════════════════════════════════════════
//  ATTENDANCE EXCEL IMPORT
// ═══════════════════════════════════════════════════════════
function dropAtt(ev){ev.preventDefault();document.getElementById('attUz').classList.remove('drag');importAtt({target:{files:ev.dataTransfer.files}});}
async function importAtt(evt){
  const files=[...evt.target.files];if(!files.length)return;
  let added=0,errs=[];
  document.getElementById('attLog').textContent='解析中…';
  for(const f of files){
    try{
      const buf=await f.arrayBuffer();
      const wb=XLSX.read(new Uint8Array(buf),{type:'array',cellDates:true});
      const r=parseAttWb(wb);
      mergeAtt(r);added+=r.length;
    }catch(e){errs.push(f.name+': '+e.message);}
  }
  saveAttLS();rebuildPeriods();renderAll();updateCfgKpis();
  const msg=`✅ 匯入 ${added} 筆`+(errs.length?`，錯誤${errs.length}個`:'');
  document.getElementById('attLog').textContent=msg;toast(msg);evt.target.value='';
}
function parseAttWb(wb){
  // Phase 0：共識年月
  const ym={};
  for(const sn of wb.SheetNames){const m=guessYM(wb.Sheets[sn]);if(m)ym[m]=(ym[m]||0)+1;}
  let consensusYM=null,maxV=0;
  for(const[k,v] of Object.entries(ym)){if(v>maxV&&+k.slice(0,4)>=2020){consensusYM=k;maxV=v;}}
  const recs=[];
  for(const sn of wb.SheetNames){
    if(!/^\d+$/.test(sn.trim()))continue;
    const day=parseInt(sn.trim(),10);if(day<1||day>31)continue;
    let ym2=guessYM(wb.Sheets[sn]);
    if(ym2&&consensusYM&&ym2!==consensusYM)ym2=consensusYM;
    if(!ym2)ym2=consensusYM;if(!ym2)continue;
    const dateStr=`${ym2}-${String(day).padStart(2,'0')}`;
    if(isNaN(new Date(dateStr)))continue;
    const rows=XLSX.utils.sheet_to_json(wb.Sheets[sn],{header:1,defval:'',raw:true});
    for(const row of rows){
      for(let c=0;c<Math.min(row.length,12);c++){
        const cell=String(row[c]||'').trim();
        if(!cell||!/^[lLaAgG]\s*\d|^[Ll]ine\s*\d|sewing|garment/i.test(cell))continue;
        const nexts=row.slice(c+1,c+10).map(v=>parseFloat(v)||0);
        const hc=nexts[0]||0;if(hc<1||hc>1000)continue;
        recs.push({id:`a_${dateStr}_${normLine(cell)}_${Math.random().toString(36).slice(2,5)}`,date:dateStr,line:normLine(cell),lineRaw:cell,hc,att:nexts[1]||hc,join:nexts[2]||0,resign:nexts[3]||0,ml:nexts[4]||0,al:0,pl:0,sl:0,np:0});
        break;
      }
    }
  }
  return recs;
}
function guessYM(ws){
  for(let r=0;r<6;r++)for(let c=0;c<30;c++){
    const a=XLSX.utils.encode_cell({r,c}),cell=ws[a];if(!cell)continue;
    if(/^date:?$/i.test(String(cell.v||'').trim())){
      const nc=ws[XLSX.utils.encode_cell({r,c:c+1})];if(!nc)continue;
      let d=null;
      if(nc.v instanceof Date)d=nc.v;
      else if(typeof nc.v==='number'&&nc.v>40000)d=new Date(Math.round((nc.v-25568)*86400000));
      if(d&&!isNaN(d)&&d.getFullYear()>=2020)return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0');
    }
  }
  return null;
}
function mergeAtt(recs){const ex=new Set(ATT_DB.map(r=>r.date+'_'+r.line));recs.forEach(r=>{if(!ex.has(r.date+'_'+r.line))ATT_DB.push(r);});}
function saveAttLS(){try{localStorage.setItem(LS_ATT,JSON.stringify(ATT_DB));}catch(e){}}

// ═══════════════════════════════════════════════════════════
//  EXPORT / IMPORT
// ═══════════════════════════════════════════════════════════
function exportJSON(){const b=new Blob([JSON.stringify({attDb:ATT_DB,savedAt:new Date().toISOString()},null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='VRT_Complete_'+new Date().toISOString().slice(0,10)+'.json';a.click();toast('✅ 已匯出');}
function restoreJSON(evt){const f=evt.target.files[0];if(!f)return;const rdr=new FileReader();rdr.onload=e=>{try{const d=JSON.parse(e.target.result);if(d.attDb){ATT_DB=d.attDb;saveAttLS();}rebuildPeriods();renderAll();toast('✅ 還原完成：'+ATT_DB.length+'筆');}catch(ex){toast('❌ 還原失敗：'+ex.message);}};rdr.readAsText(f);evt.target.value='';}
function clearAtt(){if(!confirm(`確定清除全部 ${ATT_DB.length} 筆考勤記錄？`))return;ATT_DB=[];saveAttLS();rebuildPeriods();renderAll();toast('✅ 已清除');}

function saveGas(type){
  if(type==='hra'){const v=document.getElementById('hraGasInput').value.trim();if(v){localStorage.setItem(LS_HRA_GAS,v);toast('✅ HRA GAS URL 已儲存');cpLog('HRA GAS 已儲存','ok');}}
  else{const v=document.getElementById('prodGasInput').value.trim();if(v){localStorage.setItem(LS_PROD_GAS,v);toast('✅ 生產 GAS URL 已儲存');cpLog('生產 GAS 已儲存','ok');}}
}
function toggleCloud(){document.getElementById('cloudPanel').classList.toggle('open');}
function setSyncTip(msg,cls=''){const el=document.getElementById('syncTip');el.textContent=msg;el.className='sync-tip'+(cls?' '+cls:'');}
function cpLog(msg,cls=''){const el=document.getElementById('cpLog');const line=document.createElement('div');line.textContent='['+new Date().toLocaleTimeString()+']: '+msg;if(cls==='ok')line.style.color='#16a34a';el.appendChild(line);el.scrollTop=el.scrollHeight;}
function updateCpStatus(msg,cls='info'){const el=document.getElementById('cpStatus');el.textContent=msg;el.className='cpStatus '+cls;}

// ═══════════════════════════════════════════════════════════
//  TABS
// ═══════════════════════════════════════════════════════════
function switchTab(t2){
  document.querySelectorAll('.tab').forEach(b=>b.classList.toggle('on',b.dataset.t===t2));
  document.querySelectorAll('.pane').forEach(p=>p.classList.toggle('on',p.id==='pane-'+t2));
  if(t2==='sum')renderSum();else if(t2==='as')renderAS();else if(t2==='ac')renderAC();else if(t2==='am')renderAM();else if(t2==='list')renderList();else if(t2==='cfg')updateCfgKpis();
}
document.querySelectorAll('.tab').forEach(b=>b.addEventListener('click',()=>switchTab(b.dataset.t)));

function renderAll(){
  const a=document.querySelector('.pane.on')?.id?.replace('pane-','');
  if(a==='sum')renderSum();else if(a==='as')renderAS();else if(a==='ac')renderAC();else if(a==='am')renderAM();else if(a==='list')renderList();else if(a==='cfg')updateCfgKpis();
}
function toast(msg){const el=document.getElementById('toast');el.textContent=msg;el.classList.add('show');clearTimeout(toast._t);toast._t=setTimeout(()=>el.classList.remove('show'),3200);}

// ═══════════════════════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════════════════════
(async()=>{
  loadAttFromLS();loadSewFromLS();loadMatFromLS();
  // 讀 IDB（仿 sewing 讀 cutting）
  const attIDB=await readIDB(IDB_ATT);
  if(attIDB.length>ATT_DB.length){
    ATT_DB=attIDB.map(r=>{
      const rawLine = r.lineNo||r.group||r.section||r.line||'';
      const lineN = normLine(rawLine);
      if(!r.date||!rawLine||lineN==='?'||/grand|total|ttl|sum|all/i.test(rawLine))return null;
      return {date:r.date,line:lineN,lineRaw:rawLine,
        hc:+r.ttl||+r.hc||+(r.m||0)+(+r.f||0)||0,
        att:+r.att||0,join:+r.join||0,resign:+r.resign||0,
        ml:+r.ml||0,al:+r.al||0,pl:+r.pl||0,sl:+r.sl||0,np:+r.np||0};
    }).filter(Boolean);
  }
  const sewIDB=await readIDB(IDB_SEW);
  if(sewIDB.length>SEW_DB.length){SEW_DB=sewIDB.filter(r=>r.date&&r.lineNo).map(r=>({date:r.date,line:normLine(r.lineNo),lineRaw:r.lineNo,section:r.section||'',workers:+r.workers||0,pieces:+r.pieces||0,eff:+r.efficiency||0}));}
  const contIDB=await readIDB(IDB_CONT);let contLS=[];try{contLS=JSON.parse(localStorage.getItem('vrt_dashConts')||'[]');}catch(e){}
  CONT_DB=contIDB.length?contIDB:contLS;
  const probIDB=await readIDB(IDB_PROB);let probLS=[];try{probLS=JSON.parse(localStorage.getItem('vrt_dashProbs')||'[]');}catch(e){}
  PROB_DB=probIDB.length?probIDB:probLS;
  // GAS URLs
  const hraG=localStorage.getItem(LS_HRA_GAS)||'';
  const prodG=localStorage.getItem(LS_PROD_GAS)||'';
  if(document.getElementById('hraGasInput'))document.getElementById('hraGasInput').value=hraG;
  if(document.getElementById('prodGasInput'))document.getElementById('prodGasInput').value=prodG;
  // Auto pull from cloud if GAS URLs exist
  if(hraG||prodG){
    setSyncTip('☁ 自動同步中…');
    doPull().then(()=>{}).catch(()=>{setSyncTip('');});
  }
  rebuildPeriods();renderAll();updateCfgKpis();
  cpLog('初始化完成：考勤'+ATT_DB.length+' 車縫'+SEW_DB.length+' 合約'+CONT_DB.length+' 孕假'+MAT_DB.length,'ok');
})();
